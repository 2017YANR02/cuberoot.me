<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
	<title>Head-to-Head Average of 5 Calculator</title>
	<link rel="stylesheet" href="style.css">
	<!-- NOTE: WCA 项目图标字体 -->
	<link rel="stylesheet" href="https://cdn.cubing.net/v0/css/@cubing/icons/css">
</head>

<body>
	<main class="hth-app">
		<!-- NOTE: 语言切换按钮（固定右上角） -->
		<button class="lang-toggle" id="lang-toggle">
			<span class="globe-icon">🌐</span>
			<span class="lang-label"></span>
		</button>

		<!-- NOTE: 比赛名称 -->
		<input class="comp-name" id="comp-name" placeholder="Result Calculator" />


		<!-- NOTE: SVG 图表容器 — Phase 3 填充 -->
		<div id="chart-container"></div>

		<!-- NOTE: 输入网格容器 — Phase 2 填充 -->
		<div id="input-grid-container"></div>

		<div class="controls" id="controls">
			<button id="clear-all">Clear</button>
			<button id="rand-fill">Rand</button>
			<button id="sim-a" class="sim-btn sim-a">🎯 A</button>
			<span id="sim-count-a" class="sim-count"></span>
			<button id="sim-b" class="sim-btn sim-b">🎯 B</button>
			<span id="sim-count-b" class="sim-count"></span>
			<button id="sim-race" class="sim-btn sim-race">⚔️ Race</button>
			<span id="sim-count-race" class="sim-count"></span>
			<span class="rand-info" data-tip="Rand: Row 1 ~ Ao100 World #1, Row 2 ~ Ao100 World #2. KDE sampling with Silverman bandwidth. &#10;&#10;🎯 A / 🎯 B: Repeatedly rand until average beats Target Avg. &#10;⚔️ Race: Both simulate — first to beat target wins. &#10;×N = number of tries.">&#9432;</span>
		</div>

		<!-- NOTE: 进步幅度滑杆 — 控制 KDE 采样的 Target 锚定缩放 -->
		<div class="progress-controls" id="progress-controls">
			<div class="progress-row progress-a">
				<span class="progress-label">A</span>
				<input type="range" id="progress-slider-a" class="progress-slider slider-a" min="0" max="150" value="0" step="1">
				<span id="progress-info-a" class="progress-info">0%</span>
			</div>
			<div class="progress-row progress-b">
				<span class="progress-label">B</span>
				<input type="range" id="progress-slider-b" class="progress-slider slider-b" min="0" max="150" value="0" step="1">
				<span id="progress-info-b" class="progress-info">0%</span>
			</div>
			<span class="rand-info" data-tip="Player Improvement Slider &#10;&#10;Models how much faster a player has become since their Ao100 baseline. &#10;&#10;• 0% = Current level (Ao100 average from official results) &#10;• 100% = Improved enough that expected average ≈ Target Avg &#10;• >100% = Surpassed the target &#10;&#10;Math: each solve is scaled by α = 1 − (progress/100) × (1 − Target/μ), where μ = Ao100 mean. This multiplicative scaling preserves the coefficient of variation (CV), meaning both mean and standard deviation shrink proportionally — consistent with how real cubers improve. &#10;&#10;Affects both Rand and 🎯 Simulate buttons.">&#9432;</span>
		</div>
		<div id="numpad">
			<div id="numpad-display"><span id="numpad-label"></span><span id="numpad-value"></span></div>
			<div id="numpad-grid">
				<button class="np-btn np-digit" data-key="1">1</button>
				<button class="np-btn np-digit" data-key="2">2</button>
				<button class="np-btn np-digit" data-key="3">3</button>
				<button class="np-btn np-op" data-key="backspace"><svg viewBox="0 0 33 22" width="33"
						height="22"><use href="/assets/icons.svg#icon-backspace"/></svg></button>
				<button class="np-btn np-digit" data-key="4">4</button>
				<button class="np-btn np-digit" data-key="5">5</button>
				<button class="np-btn np-digit" data-key="6">6</button>
				<button class="np-btn np-op" data-key="dnf">DNF</button>
				<button class="np-btn np-digit" data-key="7">7</button>
				<button class="np-btn np-digit" data-key="8">8</button>
				<button class="np-btn np-digit" data-key="9">9</button>
				<button class="np-btn np-action np-enter" data-key="enter"><svg viewBox="0 0 24 24"
						width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
						stroke-linecap="round" stroke-linejoin="round">
						<polyline points="9 10 4 15 9 20" />
						<path d="M20 4v7a4 4 0 0 1-4 4H4" />
					</svg></button>
				<button class="np-btn np-digit" data-key="dotcolon">·:</button>
				<button class="np-btn np-digit" data-key="0">0</button>
				<button class="np-btn np-action-alt" data-key="tab">TAB</button>
			</div>
		</div>

		<!-- NOTE: 项目选择器 — 标注当前比赛项目 -->
		<div id="event-selector-container"></div>

		<!-- NOTE: 指标对比表格 — 可折叠 -->
		<details id="calc-section">
			<summary class="stats-toggle">📊 Statistics</summary>
			<table id="calc-table">
				<thead>
					<tr>
						<th>Metric</th>
						<th id="calc-th-a">Seed 1</th>
						<th id="calc-th-b">Seed 2</th>
					</tr>
				</thead>
				<tbody id="calc-tbody"></tbody>
			</table>
		</details>
	</main>

	<!-- NOTE: confetti 庆祝特效库 — WR avg 达成时触发 -->
	<script src="/battle/confetti.min.js"></script>
	<script type="module" src="js/app.js"></script>
	<script src="/assets/js/logo_nav.js" defer></script>
	<script>
		// NOTE: iOS Safari 会忽略 user-scalable=no，需要 JS 拦截多指 touch 阻止 pinch-to-zoom
		document.addEventListener('touchmove', function(e) {
			if (e.touches.length > 1) e.preventDefault();
		}, { passive: false });
		// NOTE: Safari 专有 gesture 事件 — pinch-to-zoom 的真正入口
		document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
		document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
	</script>
</body>

</html>
