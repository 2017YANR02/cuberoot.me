<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
	<title>Head-to-Head Average of 5 Calculator</title>
	<link rel="stylesheet" href="style.css">
	<!-- NOTE: WCA 项目图标字体 -->
	<link rel="stylesheet" href="https://cdn.cubing.net/v0/css/@cubing/icons/css">
</head>

<body>
	<main class="hth-app">
		<!-- NOTE: 语言切换按钮（固定右上角） -->
		<button class="lang-toggle" id="lang-toggle">
			<span class="globe-icon">🌐</span>
			<span class="lang-label"></span>
		</button>

		<!-- NOTE: 比赛名称 -->
		<input class="comp-name" id="comp-name" placeholder="Result Calculator" />


		<!-- NOTE: SVG 图表容器 — Phase 3 填充 -->
		<div id="chart-container"></div>

		<!-- NOTE: 输入网格容器 — Phase 2 填充 -->
		<div id="input-grid-container"></div>

		<!-- NOTE: 控制按钮 — Phase 5 启用 -->
		<div class="controls" id="controls">
			<button id="seed-prev" disabled>&lt;</button>
			<span id="seed-label">Seeds 1-2</span>
			<button id="seed-next">&gt;</button>
			<button id="clear-all">Clear</button>
			<button id="rand-fill">Rand</button>
			<span class="rand-info" data-tip="Row 1 ~ Ao100 World #1, Row 2 ~ Ao100 World #2. Method: KDE (pick a real solve, add Gaussian jitter with Silverman bandwidth). 333fm/444bf/555bf have no Ao100 data and fall back to log-normal.">&#9432;</span>
		</div>

		<!-- NOTE: 数字键盘 -->
		<div id="numpad">
			<div id="numpad-display"><span id="numpad-label"></span><span id="numpad-value"></span></div>
			<div id="numpad-grid">
				<button class="np-btn np-digit" data-key="1">1</button>
				<button class="np-btn np-digit" data-key="2">2</button>
				<button class="np-btn np-digit" data-key="3">3</button>
				<button class="np-btn np-op" data-key="backspace"><svg viewBox="0 0 33 22" width="33"
						height="22"><use href="/assets/icons.svg#icon-backspace"/></svg></button>
				<button class="np-btn np-digit" data-key="4">4</button>
				<button class="np-btn np-digit" data-key="5">5</button>
				<button class="np-btn np-digit" data-key="6">6</button>
				<button class="np-btn np-op" data-key="dnf">DNF</button>
				<button class="np-btn np-digit" data-key="7">7</button>
				<button class="np-btn np-digit" data-key="8">8</button>
				<button class="np-btn np-digit" data-key="9">9</button>
				<button class="np-btn np-action np-enter" data-key="enter"><svg viewBox="0 0 24 24"
						width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
						stroke-linecap="round" stroke-linejoin="round">
						<polyline points="9 10 4 15 9 20" />
						<path d="M20 4v7a4 4 0 0 1-4 4H4" />
					</svg></button>
				<button class="np-btn np-digit" data-key="dotcolon">·:</button>
				<button class="np-btn np-digit" data-key="0">0</button>
				<button class="np-btn np-action-alt" data-key="tab">TAB</button>
			</div>
		</div>

		<!-- NOTE: 项目选择器 — 标注当前比赛项目 -->
		<div id="event-selector-container"></div>

		<!-- NOTE: 指标对比表格 -->
		<div id="calc-section">
			<table id="calc-table">
				<thead>
					<tr>
						<th>Metric</th>
						<th id="calc-th-a">Seed 1</th>
						<th id="calc-th-b">Seed 2</th>
					</tr>
				</thead>
				<tbody id="calc-tbody"></tbody>
			</table>

		</div>
	</main>

	<!-- NOTE: confetti 庆祝特效库 — WR avg 达成时触发 -->
	<script src="/battle/confetti.min.js"></script>
	<script type="module" src="js/app.js"></script>
	<script src="/assets/js/logo_nav.js" defer></script>
	<script>
		// NOTE: iOS Safari 会忽略 user-scalable=no，需要 JS 拦截多指 touch 阻止 pinch-to-zoom
		document.addEventListener('touchmove', function(e) {
			if (e.touches.length > 1) e.preventDefault();
		}, { passive: false });
		// NOTE: Safari 专有 gesture 事件 — pinch-to-zoom 的真正入口
		document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
		document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
	</script>
</body>

</html>
