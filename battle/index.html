<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- NOTE: iOS Safari 全屏支持（添加到主屏幕后生效） -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#000000">

    <title data-i18n="battle.title">1v1 Battle Timer</title>
    <meta name="description" content="Head-to-head Rubik's Cube battle timer. Challenge your friends face to face.">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MXJH30352W"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-MXJH30352W');
    </script>

    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../custom_icons/icon-192x192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="battle.css">
</head>

<body>
    <!-- NOTE: 返回按钮（固定左上角，不受旋转影响） -->
    <a href="../" class="back-btn" aria-label="Back">‹</a>

    <!-- ===== Player 2（上方，旋转 180° 让对面的人看） ===== -->
    <div id="player-top" class="player-area rotated">
        <div id="penalties-1" class="penalty-buttons">
            <button class="penalty-btn active" data-penalty="ok">OK</button>
            <button class="penalty-btn" data-penalty="+2">+2</button>
            <button class="penalty-btn" data-penalty="dnf">DNF</button>
        </div>
        <div id="time-1" class="time-display">0.000</div>
        <div id="scramble-1" class="scramble-text">
            <span class="loading">Generating scramble...</span>
        </div>
        <div id="scramble-img-1" class="scramble-img"></div>
    </div>

    <!-- ===== 中间栏（比分 + 设置） ===== -->
    <div class="middle-bar">
        <!-- NOTE: 左侧比分（Player 2，上方玩家，旋转显示所以在其视角的右侧） -->
        <div class="score-section">
            <span>⚔️</span>
            <span id="score-1" class="score-value">0</span>
        </div>

        <div class="middle-actions">
            <!-- NOTE: 桌面端键盘提示 -->
            <span class="key-hint" data-i18n="battle.key_hint">Enter ↑ · ↓ Space</span>
            <button id="btn-fullscreen" class="middle-btn" title="Fullscreen">⛶</button>
            <!-- NOTE: CubeRoot logo，点击回首页 -->
            <a href="../" class="middle-logo" aria-label="Home">
                <img src="../CubeRoot-dark.png" alt="CubeRoot" height="24">
            </a>
            <button id="btn-settings" class="middle-btn" title="Settings">⚙️</button>
        </div>

        <!-- NOTE: 右侧比分（Player 1，下方玩家） -->
        <div class="score-section">
            <span id="score-0" class="score-value">0</span>
            <span>⚔️</span>
        </div>
    </div>

    <!-- ===== Player 1（下方，正常方向） ===== -->
    <div id="player-bottom" class="player-area">
        <div id="scramble-0" class="scramble-text">
            <span class="loading">Generating scramble...</span>
        </div>
        <div id="scramble-img-0" class="scramble-img"></div>
        <div id="time-0" class="time-display">0.000</div>
        <div id="penalties-0" class="penalty-buttons">
            <button class="penalty-btn active" data-penalty="ok">OK</button>
            <button class="penalty-btn" data-penalty="+2">+2</button>
            <button class="penalty-btn" data-penalty="dnf">DNF</button>
        </div>
    </div>

    <!-- ===== 设置弹窗 ===== -->
    <div id="settings-overlay" class="settings-overlay">
        <div class="settings-panel">
            <div class="settings-title" data-i18n="battle.settings">Settings</div>

            <div class="settings-group">
                <div class="settings-label" data-i18n="battle.show_image">IMAGE</div>
                <div class="setting-item toggle-row">
                    <span data-i18n="battle.show_image_desc">Show Scramble Image</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-image" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div class="settings-group">
                <div class="settings-label" data-i18n="battle.puzzle">PUZZLE</div>
                <div id="puzzle-grid" class="puzzle-grid">
                    <!-- NOTE: 由 JS 动态生成 -->
                </div>
            </div>

            <div class="settings-group">
                <button id="btn-toggle-time" class="settings-action-btn">
                    🙈 Hide time when solving
                </button>
                <button id="btn-delete-last" class="settings-action-btn" data-i18n="battle.delete_last">
                    ↩️ Delete last solve
                </button>
                <button id="btn-reset" class="settings-action-btn danger" data-i18n="battle.reset">
                    🗑️ Reset session
                </button>
            </div>

            <button id="settings-close" class="settings-close-btn" data-i18n="battle.close">Close</button>
        </div>
    </div>

    <!-- NOTE: csTimer scramble module 依赖 jQuery 子集 + kernel 颜色配置，提供最小 shim -->
    <script>
        var $ = { isArray: Array.isArray, now: Date.now, noop: function(){} };
        // NOTE: kernel.getProp 为 image.js 提供 WCA 标准配色（默认值），不读取 localStorage
        var kernel = {
            getProp: function(key) {
                var defaults = {
                    'colcube': '#ff0#fa0#00f#fff#f00#0d0', // YOBWRG WCA 标准
                    'colclk':  '#f00#37b#5cf#ff0#850',
                    'colsq1':  '#ff0#f80#0f0#fff#f00#00f',
                    'colpyr':  '#0f0#f00#00f#ff0',
                    'colskb':  '#ff0#fa0#00f#fff#f00#0d0',
                    'colmgm':  '#fff#d00#060#81f#fc0#00b#ffb#8df#f83#7e0#f9f#999',
                    'colfto':  '#fff#808#0d0#f00#00f#bbb#ff0#fa0',
                    'colico':  '#fff#084#b36#a85#088#811#e71#b9b#05a#ed1#888#6a3#e8b#a52#6cb#c10#fa0#536#49c#ec9',
                    'col15p':  '#f00#fa0#ff0#0d0#00f#fff#888#000',
                    'col-font':  '#fff',
                    'col-board': '#000'
                };
                return defaults[key] !== undefined ? defaults[key] : null;
            }
        };
    </script>
    <!-- NOTE: csTimer 打乱模块（纯 JS，无 WASM，自托管，GPL-3.0 from cs0x7f/cstimer） -->
    <script src="scramble_module.js"></script>
    <script src="battle.js" defer></script>
    <script src="../i18n/i18n.js" defer></script>
</body>

</html>
