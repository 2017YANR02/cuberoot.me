<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
</head>

<body>
    <script>
        // NOTE: SPA 路由 fallback — React SPA 部署在根路径 /
        // 非静态文件路径全部重定向到 / 让 React Router 处理
        var p = location.pathname;

        // 静态资源路径 — 不做 SPA 重定向，返回真实 404
        var isStatic = p.startsWith('/stats/') || p.startsWith('/legacy/') || p.startsWith('/_assets/');

        if (!isStatic && p !== '/' && p !== '/index.html') {
            // NOTE: 存入 sessionStorage，SPA 加载后用 replaceState 恢复原始路径
            sessionStorage.setItem('spa-redirect', p + location.search + location.hash);
            location.replace('/');
        }
        // 旧链接兼容 — /app/ 下的路径重定向到根路径（去掉 /app/ 前缀）
        else if (p.startsWith('/app/')) {
            var newPath = p.replace('/app/', '/');
            location.replace(newPath || '/');
        }
        else {
            document.body.style.cssText = 'font-family:system-ui;color:#888;text-align:center;padding:80px 20px';
            document.body.innerHTML = '<h1>404</h1><p>Page not found</p><a href="/" style="color:#60a5fa">← Home</a>';
        }
    </script>
    <noscript>
        <h1>404 - Page Not Found</h1>
        <p><a href="/">← Home</a></p>
    </noscript>
</body>

</html>
