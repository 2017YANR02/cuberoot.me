<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
</head>

<body>
    <script>
        // NOTE: SPA 子路由重定向 — /app/calc 等路径在 GitHub Pages 没有物理文件
        // 存入 sessionStorage 后跳转到 /app/，SPA 加载后用 replaceState 恢复
        var p = location.pathname;
        if (p.startsWith('/app/') && p !== '/app/' && p !== '/app/index.html') {
            sessionStorage.setItem('spa-redirect', p + location.search + location.hash);
            location.replace('/app/');
        }
        // NOTE: /recon/数字 → 重定向到独立详情页
        else {
            var m = p.match(/^\/recon\/(\d+)$/);
            if (m) {
                location.replace('/recon/detail/?id=' + m[1]);
            } else {
                document.body.style.cssText = 'font-family:system-ui;color:#888;text-align:center;padding:80px 20px';
                document.body.innerHTML = '<h1>404</h1><p>Page not found</p><a href="/" style="color:#60a5fa">← Home</a>';
            }
        }
    </script>
    <noscript>
        <h1>404 - Page Not Found</h1>
        <p><a href="/">← Home</a></p>
    </noscript>
</body>

</html>
