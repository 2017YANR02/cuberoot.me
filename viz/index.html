<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distribution Evolution | Rubik's Cube Toolkit</title>
  <meta name="description" content="Visualize how a cuber's solve time distribution evolves over competitions">
  <link rel="icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- NOTE: 国旗图标 + 共享搜索组件样式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css">
  <link rel="stylesheet" href="/shared/wca_search.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <!-- 顶部标题区 -->
    <header class="header">
      
      <div class="title-block">
        <h1 id="playerName">Distribution Evolution</h1>
        <div class="subtitle" id="playerMeta"></div>
      </div>
      <!-- NOTE: 6 模式按钮组 -->
      <div class="mode-toggle">
        <div class="mode-row">
          <button class="mode-btn active" data-mode="singles">Singles</button>
          <button class="mode-btn" data-mode="mo3">Mo3</button>
          <button class="mode-btn" data-mode="ao5">Ao5</button>
          <button class="mode-btn" data-mode="ao12">Ao12</button>
          <button class="mode-btn" data-mode="ao25">Ao25</button>
          <button class="mode-btn" data-mode="ao50">Ao50</button>
          <button class="mode-btn" data-mode="ao100">Ao100</button>
        </div>
        <div class="mode-row mode-row-round" id="modeRowRound">
          <button class="mode-btn mode-btn-round" data-mode="avg">Avg</button>
          <button class="mode-btn mode-btn-round" data-mode="bao5">BAo5</button>
          <button class="mode-btn mode-btn-round" data-mode="wao5">WAo5</button>
          <button class="mode-btn mode-btn-round" data-mode="mo5">Mo5</button>
          <button class="mode-btn mode-btn-round" data-mode="bpa">BPA</button>
          <button class="mode-btn mode-btn-round" data-mode="wpa">WPA</button>
          <button class="mode-btn mode-btn-round" data-mode="median">Median</button>
          <button class="mode-btn mode-btn-round" data-mode="bestc">BestC</button>
          <button class="mode-btn mode-btn-round" data-mode="worstc">WorstC</button>
          <button class="mode-btn mode-btn-round" data-mode="worst">Worst</button>
        </div>
        <!-- NOTE: 手机端折叠/展开第二行按钮 -->
        <button class="mode-expand-btn" id="modeExpandBtn" title="展开/收起更多模式">▾ 更多</button>
      </div>
    </header>

    <!-- NOTE: 搜索栏 + 项目选择器 + CSV 下载 -->
    <div class="toolbar">
      <div id="personPickerContainer" class="toolbar-search"></div>
      <select id="eventSelect" class="toolbar-select">
        <option value="333" selected>3×3</option>
        <option value="222">2×2</option>
        <option value="444">4×4</option>
        <option value="555">5×5</option>
        <option value="666">6×6</option>
        <option value="777">7×7</option>
        <option value="333oh">3×3 OH</option>
        <option value="333bf">3×3 BLD</option>
        <option value="pyram">Pyraminx</option>
        <option value="skewb">Skewb</option>
        <option value="sq1">Square-1</option>
        <option value="clock">Clock</option>
        <option value="minx">Megaminx</option>
        <option value="333fm">FMC</option>
        <option value="444bf">4×4 BLD</option>
        <option value="555bf">5×5 BLD</option>
        <option value="333mbf">MBLD</option>
      </select>
      <button class="toolbar-btn" id="csvDownload" title="下载 CSV">📥 CSV</button>
    </div>

    <!-- 主可视化区域 -->
    <main class="viz-main">
      <div class="canvas-wrapper">
        <canvas id="kdeCanvas"></canvas>
        <div class="mean-label" id="meanLabel" style="display:none">
          <span class="mean-dot"></span>
          <span class="mean-text" id="meanText"></span>
        </div>
        <div class="ghost-mean-label" id="ghostMeanLabel" style="display:none">
          <span class="ghost-dot"></span>
          <span class="ghost-text" id="ghostMeanText"></span>
        </div>
        <!-- 视图模式切换 -->
        <div class="view-mode-group">
          <button class="view-btn active" data-view="kde">KDE</button>
          <button class="view-btn" data-view="histogram">直方图</button>
          <button class="view-btn" data-view="both">叠加</button>
          <button class="view-btn" data-view="line">折线</button>
          <button class="view-btn" data-view="cumHist">累积</button>
          <button class="view-btn" id="resetRangeBtn" title="重置缩放范围 (双击画布也可重置)">⊡</button>
        </div>
        <!-- 图例说明按钮 -->
        <button class="legend-info-btn" id="legendInfoBtn" title="图例说明">ⓘ</button>
        <!-- NOTE: 全屏按钮 -->
        <button class="fullscreen-btn" id="fullscreenBtn" title="全屏">⛶</button>
        <div class="legend-tooltip" id="legendTooltip">
          <label class="legend-toggle">
            <span class="legend-diamond">◆</span> 当前值
            <input type="checkbox" checked data-layer="currentVal">
            <span class="toggle-pill"></span>
          </label>
          <label class="legend-toggle">
            <span class="legend-circle">●</span> 窗口均值
            <input type="checkbox" checked data-layer="meanLine">
            <span class="toggle-pill"></span>
          </label>
          <label class="legend-toggle">
            <span class="legend-ghost">━</span> 初始残影
            <input type="checkbox" checked data-layer="ghost">
            <span class="toggle-pill"></span>
          </label>
          <label class="legend-toggle">
            <span class="legend-trail">✦</span> 均值轨迹
            <input type="checkbox" checked data-layer="trail">
            <span class="toggle-pill"></span>
          </label>
          <label class="legend-toggle">
            <span class="legend-bimodal">⚡</span> 双峰检测
            <input type="checkbox" checked data-layer="bimodal">
            <span class="toggle-pill"></span>
          </label>
          <label class="legend-toggle">
            <span class="legend-follow">⊙</span> 均值居中
            <input type="checkbox" data-layer="followMean">
            <span class="toggle-pill"></span>
          </label>
        </div>
      </div>

      <!-- 统计面板 -->
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-label">均值</span>
          <span class="stat-value mono" id="statMean">--</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">标准差</span>
          <span class="stat-value mono" id="statStd">--</span>
        </div>
        <div class="stat-item">
          <span class="stat-label" id="statSyncLabel">把数</span>
          <span class="stat-value mono" id="statSync">--</span>
        </div>
        <div class="stat-item stat-comp">
          <span class="stat-label">比赛</span>
          <span class="stat-value" id="statComp">--</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">进步</span>
          <span class="stat-value mono" id="statDelta">--</span>
        </div>
      </div>

      <!-- 播放控制区 -->
      <div class="controls">
        <button class="ctrl-btn" id="playBtn" title="播放/暂停 (Space)">
          <svg class="icon-play" id="iconPlay" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
          <svg class="icon-pause" id="iconPause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
        </button>
        <div class="progress-wrapper">
          <input type="range" id="progress" min="0" max="100" value="0" step="1">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="speed-group">
          <button class="speed-btn" data-speed="1">1×</button>
          <button class="speed-btn active" data-speed="3">3×</button>
          <button class="speed-btn" data-speed="10">10×</button>

        </div>
        <div class="sync-group" id="syncGroup" style="display:none" title="多选手同步模式">
          <button class="sync-btn active" data-sync="solve">把数</button>
          <button class="sync-btn" data-sync="date">日期</button>
        </div>
      </div>

      <div class="shortcuts-hint">
        <kbd>Space</kbd> 播放/暂停 &nbsp;
        <kbd>←</kbd><kbd>→</kbd> 步进 &nbsp;
        <kbd>Shift</kbd>+<kbd>←</kbd><kbd>→</kbd> 快进
      </div>

      <!-- 脊线图区域 -->
      <div class="section-divider"></div>
      <h2 class="section-title">分布全景</h2>
      <div class="ridgeline-wrapper">
        <canvas id="ridgelineCanvas"></canvas>
      </div>
    </main>
  </div>

  <!-- NOTE: loading overlay -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>


  <!-- NOTE: 共享模块 + 功能脚本 -->
  <script src="/shared/wca_search.js"></script>
  <script src="/shared/wca_person_picker.js"></script>
  <script src="/shared/wca_comp_data.js"></script>
  <script src="rolling_stats.js"></script>
  <script src="csv_columns.js"></script>
  <script src="round_metrics.js"></script>
  <script src="csv_export.js"></script>
  <script src="viz.js"></script>
  <script src="ridgeline.js"></script>
</body>
</html>
