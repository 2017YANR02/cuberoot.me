<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>cross-solver WASM parity</title>
<style>
  body { font: 14px/1.5 ui-monospace, Consolas, monospace; margin: 24px; color: #222; }
  table { border-collapse: collapse; margin: 12px 0; }
  th, td { border: 1px solid #ccc; padding: 2px 8px; text-align: right; }
  th { background: #f4f4f4; }
  .ok { color: #137333; } .bad { color: #c5221f; font-weight: bold; }
  #status { font-size: 16px; font-weight: bold; margin: 12px 0; }
  #log { white-space: pre-wrap; color: #555; }
</style>
</head>
<body>
<h2>cross-solver WASM 浏览器端到端 parity</h2>
<div id="status">loading…</div>
<div id="grid"></div>
<div id="log"></div>

<script type="module">
import { createCrossSolver } from './cross-solver-client.js';

// golden(scramble_5_std.csv):每变体 6 视角 [z0,z2,z3,z1,x3,x1]
const GOLD = [
  ['22001', "B2 U' L2 U F2 L2 D2 L2 U F2 L F2 L D U L' D2 F' U2 B",
    [[6,6,6,5,7,5],[7,7,8,7,9,7],[9,10,10,9,10,9],[11,11,11,12,12,10],[14,14,14,13,14,14]]],
  ['23001', "D2 U L2 B2 R2 F2 R2 U2 R2 D' R' D B2 U B' R B' D B' L'",
    [[6,6,6,6,5,5],[7,7,6,8,7,5],[10,9,8,9,9,8],[12,11,11,11,12,11],[13,13,12,13,14,12]]],
  ['24001', "L2 D F2 D' B2 L2 R2 U2 F2 D L' U2 R2 B' R F R2 D' U F L' F'",
    [[6,6,7,7,6,6],[8,7,8,8,8,7],[10,9,10,9,10,9],[12,11,11,11,12,11],[14,14,14,13,13,14]]],
  ['25001', "U' B2 U2 F2 L2 D' F2 L2 B' D2 B' L' F R D L' B2 L2 B2 D' L2 U",
    [[6,6,5,6,6,6],[8,7,7,7,7,7],[10,9,9,10,9,9],[12,10,12,12,12,12],[14,13,15,14,14,15]]],
  ['26001', "U2 R2 U' F2 D' L2 F2 D L B2 F2 D' L' U2 L R F U2 B' D2 B R2",
    [[3,6,6,4,6,5],[3,8,7,4,6,5],[5,10,10,5,8,7],[9,11,11,8,10,9],[12,14,13,11,13,12]]],
];
const VARIANTS = ['cross', 'xc', 'xxc', 'xxxc', 'xxxxc'];
const log = (m) => { document.getElementById('log').textContent += m + '\n'; };

(async () => {
  const t0 = performance.now();
  const cs = createCrossSolver({
    workerUrl: new URL('./cross-solver-worker.js', import.meta.url),
    glueUrl: new URL('./cross_solver.js', import.meta.url).href,
    wasmUrl: new URL('./cross_solver_bg.wasm', import.meta.url).href,
    tablesBase: new URL('./tables', import.meta.url).href,
  });
  try {
    await cs.ready;
  } catch (e) {
    document.getElementById('status').textContent = 'INIT FAILED: ' + e.message;
    document.getElementById('status').className = 'bad';
    window.__parityDone = { ok: false, error: 'init: ' + e.message };
    return;
  }
  log(`init (wasm + 6 tables) in ${Math.round(performance.now() - t0)}ms`);

  let pass = 0, total = 0;
  const timings = {};
  let html = '<table><tr><th>id</th><th>variant</th><th>got [z0,z2,z3,z1,x3,x1]</th><th>ok?</th><th>ms</th></tr>';
  for (const [id, scr, exp] of GOLD) {
    for (let v = 0; v < 5; v++) {
      const ts = performance.now();
      const got = await cs.solve(scr, v);
      const ms = performance.now() - ts;
      timings[VARIANTS[v]] = (timings[VARIANTS[v]] || 0) + ms;
      const good = JSON.stringify(got) === JSON.stringify(exp[v]);
      total++; if (good) pass++;
      html += `<tr><td>${id}</td><td>${VARIANTS[v]}</td><td>[${got.join(',')}]</td>`
        + `<td class="${good ? 'ok' : 'bad'}">${good ? 'OK' : 'FAIL exp [' + exp[v].join(',') + ']'}</td>`
        + `<td>${Math.round(ms)}</td></tr>`;
    }
  }
  html += '</table>';
  document.getElementById('grid').innerHTML = html;

  log('per-variant total ms (5 scrambles, 6 rotations each):');
  for (const v of VARIANTS) log(`  ${v}: ${Math.round(timings[v])}ms`);

  const allOk = pass === total;
  const st = document.getElementById('status');
  st.textContent = `${pass}/${total} variant-checks passed — ${allOk ? 'WASM BIT-EXACT vs golden ✓' : 'MISMATCH'}`;
  st.className = allOk ? 'ok' : 'bad';
  window.__parityDone = { ok: allOk, pass, total, timings };
})();
</script>
</body>
</html>
