---
title: "Recon - Submit"
layout: default
---

<link rel="stylesheet" href="/recon/recon.css">

<!-- NOTE: 页面头部：返回箭头 + 标题 -->
<div class="detail-page-header">
    <a href="/recon/" class="detail-back-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg></a>
    <h1 id="submit-title" data-i18n-en="➕ Add Recon" data-i18n-zh="➕ 添加复盘">➕ Add Recon</h1>
</div>

<div class="submit-page-layout">
    <form id="recon-form" class="recon-form submit-two-col" autocomplete="off">
        <!-- ========== 左列：核心内容 ========== -->
        <div class="submit-col-main">
            <!-- 实时统计显示 -->
            <div class="recon-form-group">
                <div id="rf-stats-display" class="rf-stats-display" style="display:none"></div>
            </div>
            <!-- 打乱公式 -->
            <div class="recon-form-group">
                <label data-i18n-en="Scramble" data-i18n-zh="打乱公式">Scramble</label>
                <input type="text" id="rf-scramble" placeholder="Paste scramble (optional)"
                    data-i18n-placeholder-en="Paste scramble (optional)" data-i18n-placeholder-zh="粘贴打乱公式（可选）">
            </div>
            <!-- 解法 -->
            <div class="recon-form-group">
                <label data-i18n-en="Solution" data-i18n-zh="解法">Solution</label>
                <textarea id="rf-recon" rows="12" placeholder="Paste solution..."
                    data-i18n-placeholder-en="Paste solution...&#10;e.g.:&#10;x2 // insp&#10;R' F R D' F' // xxcross&#10;..."
                    data-i18n-placeholder-zh="粘贴解法...&#10;例如：&#10;x2 // insp&#10;R' F R D' F' // xxcross&#10;..."
                    required></textarea>
            </div>
            <!-- 预览动画 -->
            <div class="recon-form-group">
                <button type="button" id="rf-preview-btn" class="recon-btn" style="margin-bottom:8px"
                    data-i18n-en="Preview Animation" data-i18n-zh="预览动画">Preview Animation</button>
                <div id="rf-preview-container" style="display:none">
                    <iframe id="rf-preview-iframe"
                        style="width:100%;height:500px;border:1px solid #444;border-radius:8px;background:#fff"
                        allowfullscreen></iframe>
                </div>
            </div>
        </div> <!-- submit-col-main -->
        <!-- ========== 右列：元数据 ========== -->
        <div class="submit-col-meta">
            <!-- 选手 + 成绩 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Solver" data-i18n-zh="选手">Solver</label>
                    <input type="text" id="rf-solver" value="" autocomplete="one-time-code" required>
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Time (sec)" data-i18n-zh="成绩 (秒)">Time (sec)</label>
                    <input type="text" id="rf-single" placeholder="3.05 或 305" required>
                </div>
            </div>
            <!-- 单次 + 单次纪录 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Single" data-i18n-zh="单次">Single</label>
                    <input type="text" id="rf-edit-value">
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Single Rec" data-i18n-zh="单次纪录">Single Rec</label>
                    <input type="text" id="rf-edit-regionalSingleRecord">
                </div>
            </div>
            <!-- 平均 + 平均纪录 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Average" data-i18n-zh="平均">Average</label>
                    <input type="text" id="rf-edit-average">
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Avg Record" data-i18n-zh="平均纪录">Avg Record</label>
                    <input type="text" id="rf-edit-regionalAverageRecord">
                </div>
            </div>
            <!-- AoXR + AoXR纪录 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="AoXR" data-i18n-zh="AoXR">AoXR</label>
                    <input type="text" id="rf-edit-aoType">
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="AoXR Rec" data-i18n-zh="AoXR纪录">AoXR Rec</label>
                    <input type="text" id="rf-edit-regionalAoxrRecord">
                </div>
            </div>
            <!-- 项目 + 方法 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Event" data-i18n-zh="项目">Event</label>
                    <input type="text" id="rf-event" value="3x3" list="event-options" placeholder="3x3">
                    <datalist id="event-options">
                        <option value="3x3">
                        <option value="2x2">
                        <option value="OH">
                        <option value="4x4">
                        <option value="5x5">
                        <option value="6x6">
                        <option value="7x7">
                        <option value="Mega">
                        <option value="Pyra">
                        <option value="Skewb">
                        <option value="SQ1">
                    </datalist>
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Method" data-i18n-zh="方法">Method</label>
                    <input type="text" id="rf-method" value="ZB" list="method-options" placeholder="ZB">
                    <datalist id="method-options">
                        <option value="CFOP">
                        <option value="ZB">
                        <option value="ZZ">
                        <option value="Roux">
                        <option value="Petrus">
                        <option value="LEOR">
                    </datalist>
                </div>
            </div>
            <!-- 比赛 + 日期 -->
            <div class="recon-form-row">
                <div class="recon-form-group" style="position:relative">
                    <label data-i18n-en="Competition" data-i18n-zh="比赛">Competition</label>
                    <input type="text" id="rf-comp" autocomplete="off" placeholder="Search competition (optional)"
                        data-i18n-placeholder-en="Search competition (optional)" data-i18n-placeholder-zh="搜索比赛名称（可选）">
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Date" data-i18n-zh="日期">Date</label>
                    <input type="text" id="rf-edit-date" placeholder="YYYY-MM-DD">
                </div>
            </div>
            <!-- 官方比赛 -->
            <div class="recon-form-group">
                <label><input type="checkbox" id="rf-official"> <span data-i18n-en="Official"
                        data-i18n-zh="官方比赛">Official</span></label>
            </div>
            <!-- 轮次 + 第几把 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Round" data-i18n-zh="轮次">Round</label>
                    <select id="rf-round">
                        <option value="">—</option>
                        <option value="R1">R1</option>
                        <option value="R2">R2</option>
                        <option value="R3">R3</option>
                        <option value="Fi">Fi</option>
                    </select>
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Solve #" data-i18n-zh="第几把">Solve #</label>
                    <select id="rf-solve-num">
                        <option value="">—</option>
                        <option value="1">#1</option>
                        <option value="2">#2</option>
                        <option value="3">#3</option>
                        <option value="4">#4</option>
                        <option value="5">#5</option>
                    </select>
                </div>
            </div>
            <!-- NOTE: 编辑专用字段容器 -->
            <div id="rf-edit-fields"></div>
            <!-- 魔方 + 复盘者 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Cube" data-i18n-zh="魔方">Cube</label>
                    <input type="text" id="rf-edit-cube">
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Reconer" data-i18n-zh="复盘者">Reconer</label>
                    <input type="text" id="rf-edit-reconer">
                </div>
            </div>
            <!-- 备注 -->
            <div class="recon-form-group">
                <label data-i18n-en="Note" data-i18n-zh="备注">Note</label>
                <textarea id="rf-note" rows="3" placeholder="optional" data-i18n-placeholder-en="optional"
                    data-i18n-placeholder-zh="可选"></textarea>
            </div>
            <!-- NOTE: 校验错误提示容器（JS 动态填充） -->
            <div id="rf-errors" class="rf-errors" style="display:none"></div>
            <!-- 操作按钮 -->
            <div class="recon-form-actions">
                <a href="/recon/" class="recon-btn" data-i18n-en="Cancel" data-i18n-zh="取消">Cancel</a>
                <button type="submit" id="rf-submit-btn" class="recon-btn recon-btn-primary" data-i18n-en="Submit"
                    data-i18n-zh="提交">Submit</button>
            </div>
        </div> <!-- submit-col-meta -->
    </form>
</div>



<script src="/recon/recon_stats.js"></script>
<script src="/recon/wca_auth.js"></script>
<script src="/recon/recon_api.js"></script>
<script src="/recon/recon_local_store.js"></script>
<script src="/recon/recon_alg_utils.js"></script>
<script src="/recon/submit/recon_submit_page.js" defer></script>
