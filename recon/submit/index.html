---
title: "Recon - Submit"
layout: default
---

<link rel="stylesheet" href="/recon/recon.css">

<!-- NOTE: 页面头部：返回箭头 + 标题 -->
<div class="detail-page-header">
    <a href="/recon/" class="detail-back-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg></a>
    <h1 id="submit-title" data-i18n-en="➕ Add Recon" data-i18n-zh="➕ 添加复盘">➕ Add Recon</h1>
</div>

<div class="submit-page-layout">
    <form id="recon-form" class="recon-form submit-two-col" autocomplete="off">
        <!-- ========== 左列：核心内容 ========== -->
        <div class="submit-col-main">
            <!-- 实时统计显示 -->
            <div class="recon-form-group">
                <div id="rf-stats-display" class="rf-stats-display" style="display:none"></div>
            </div>
            <!-- Optimal Scramble -->
            <div class="recon-form-group">
                <label data-i18n-en="Optimal Scramble" data-i18n-zh="最少步打乱">Optimal Scramble</label>
                <input type="text" id="rf-edit-optimalScramble">
            </div>
            <!-- WCA Scramble -->
            <div class="recon-form-group">
                <label data-i18n-en="WCA Scramble" data-i18n-zh="WCA打乱">WCA Scramble</label>
                <input type="text" id="rf-scramble">
            </div>
            <!-- 预览动画（放在解法上方，方便对照） -->
            <div class="recon-form-group">
                <button type="button" id="rf-preview-btn" class="recon-btn" style="margin-bottom:8px"
                    data-i18n-en="Preview Animation" data-i18n-zh="预览动画">Preview Animation</button>
                <div id="rf-twisty-container" class="recon-twisty-container" style="display:none"></div>
            </div>
            <!-- 解法 -->
            <div class="recon-form-group">
                <label data-i18n-en="Solution" data-i18n-zh="解法">Solution</label>
                <textarea id="rf-recon" rows="4" style="overflow:hidden" placeholder="Paste solution..."
                    data-i18n-placeholder-en="Paste solution...&#10;e.g.:&#10;x2 // insp&#10;R' F R D' F' // xxcross&#10;..."
                    data-i18n-placeholder-zh="粘贴解法...&#10;例如：&#10;x2 // insp&#10;R' F R D' F' // xxcross&#10;..."
                    required></textarea>
                <!-- NOTE: 魔方公式虚拟键盘——focus 时显示，方便输入解法符号 -->
                <div id="rf-vkb" class="vkb">
                    <div class="vkb-row">
                        <button type="button" data-key="U">U</button>
                        <button type="button" data-key="D">D</button>
                        <button type="button" data-key="F">F</button>
                        <button type="button" data-key="B">B</button>
                        <button type="button" data-key="R">R</button>
                        <button type="button" data-key="L">L</button>
                    </div>
                    <div class="vkb-row">
                        <button type="button" data-key="' ">'</button>
                        <button type="button" data-key="2">2</button>
                        <button type="button" data-key="w ">w</button>
                        <button type="button" data-key="/">/</button>
                        <button type="button" data-key="(">(</button>
                        <button type="button" data-key=")">)</button>
                    </div>
                    <div class="vkb-row">
                        <button type="button" data-key="x">x</button>
                        <button type="button" data-key="y">y</button>
                        <button type="button" data-key="z">z</button>
                        <button type="button" data-key="M">M</button>
                        <button type="button" data-key="E">E</button>
                        <button type="button" data-key="S">S</button>
                        <button type="button" data-key="+">+</button>
                        <button type="button" data-key="-">-</button>
                    </div>
                    <div class="vkb-row vkb-row-bottom">
                        <button type="button" data-key="dismiss" class="vkb-fn">🌐</button>
                        <button type="button" data-key=" " class="vkb-space">space</button>
                        <button type="button" data-key="enter" class="vkb-return">return</button>
                        <button type="button" data-key="backspace" class="vkb-fn vkb-fn-del">⌫</button>
                    </div>
                </div>
            </div>
        </div> <!-- submit-col-main -->
        <!-- ========== 右列：元数据 ========== -->
        <div class="submit-col-meta">
            <!-- 选手 + 成绩 -->
            <div class="recon-form-row">
                <div class="recon-form-group" style="position:relative">
                    <label data-i18n-en="Solver" data-i18n-zh="选手">Solver</label>
                    <input type="text" id="rf-solver" value="" autocomplete="one-time-code" required>
                    <!-- NOTE: 选中选手后显示富内容（旗帜+WCA ID+名字），隐藏 input -->
                    <div id="rf-solver-display" class="person-display" style="display:none"></div>
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Time (sec)" data-i18n-zh="成绩 (秒)">Time (sec)</label>
                    <input type="text" id="rf-single" placeholder="3.05 或 305" required>
                </div>
            </div>
            <!-- 单次 + 单次纪录 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Single" data-i18n-zh="单次">Single</label>
                    <input type="text" id="rf-edit-value" placeholder="4.23" data-i18n-placeholder-en="4.23" data-i18n-placeholder-zh="4.23">
                </div>
                <div class="recon-form-group" style="position:relative">
                    <label data-i18n-en="Single Record" data-i18n-zh="单次纪录">Single Record</label>
                    <input type="text" id="rf-edit-regionalSingleRecord">
                    <!-- NOTE: 选中纪录后显示彩色 badge，隐藏 input -->
                    <div id="rf-singleRec-display" class="record-display" style="display:none"></div>
                </div>
            </div>
            <!-- 平均 + 平均纪录 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Average" data-i18n-zh="平均">Average</label>
                    <input type="text" id="rf-edit-average">
                </div>
                <div class="recon-form-group" style="position:relative">
                    <label data-i18n-en="Avg Record" data-i18n-zh="平均纪录">Avg Record</label>
                    <input type="text" id="rf-edit-regionalAverageRecord">
                    <!-- NOTE: 选中纪录后显示彩色 badge，隐藏 input -->
                    <div id="rf-avgRec-display" class="record-display" style="display:none"></div>
                </div>
            </div>
            <!-- AoXR + AoXR纪录 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="AoXR" data-i18n-zh="AoXR">AoXR</label>
                    <input type="text" id="rf-edit-aoType">
                </div>
                <div class="recon-form-group" style="position:relative">
                    <label data-i18n-en="AoXR Record" data-i18n-zh="AoXR纪录">AoXR Record</label>
                    <input type="text" id="rf-edit-regionalAoxrRecord">
                    <!-- NOTE: 选中纪录后显示彩色 badge，隐藏 input -->
                    <div id="rf-aoxrRec-display" class="record-display" style="display:none"></div>
                </div>
            </div>
            <!-- 项目 + 方法 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Event" data-i18n-zh="项目">Event</label>
                    <select id="rf-event" translate="no">
                        <option value="3x3" data-i18n-option-zh="三阶魔方">3x3</option>
                        <option value="2x2" data-i18n-option-zh="二阶魔方">2x2</option>
                        <option value="4x4" data-i18n-option-zh="四阶魔方">4x4</option>
                        <option value="5x5" data-i18n-option-zh="五阶魔方">5x5</option>
                        <option value="6x6" data-i18n-option-zh="六阶魔方">6x6</option>
                        <option value="7x7" data-i18n-option-zh="七阶魔方">7x7</option>
                        <option value="3BLD" data-i18n-option-zh="三阶盲拧">3BLD</option>
                        <option value="4BLD" data-i18n-option-zh="四阶盲拧">4BLD</option>
                        <option value="5BLD" data-i18n-option-zh="五阶盲拧">5BLD</option>
                        <option value="MBLD" data-i18n-option-zh="三阶多盲">MBLD</option>
                        <option value="FMC" data-i18n-option-zh="三阶最少步">FMC</option>
                        <option value="OH" data-i18n-option-zh="三阶单手">OH</option>
                        <option value="Megaminx" data-i18n-option-zh="五魔方">Megaminx</option>
                        <option value="Pyraminx" data-i18n-option-zh="金字塔">Pyraminx</option>
                        <option value="Clock" data-i18n-option-zh="魔表">Clock</option>
                        <option value="Skewb" data-i18n-option-zh="斜转魔方">Skewb</option>
                        <option value="SQ1">SQ1</option>
                        <option value="3x3 Robot" data-i18n-option-zh="三阶机器人">3x3 Robot</option>
                        <option value="3x3 Smart" data-i18n-option-zh="三阶智能魔方">3x3 Smart</option>
                        <option value="Gear" data-i18n-option-zh="齿轮魔方">Gear</option>
                        <option value="Mirror" data-i18n-option-zh="镜面魔方">Mirror</option>
                        <option value="Feet" data-i18n-option-zh="三阶脚拧">Feet</option>
                        <option value="__other__" data-i18n-option-en="Other..." data-i18n-option-zh="其他...">Other...
                        </option>
                    </select>
                    <!-- NOTE: 选"其他"时显示的自定义输入框 -->
                    <input type="text" id="rf-event-custom" style="display:none" placeholder="Enter event name"
                        data-i18n-placeholder-en="Enter event name" data-i18n-placeholder-zh="输入项目名">
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Method" data-i18n-zh="方法">Method</label>
                    <input type="text" id="rf-method" value="ZB" list="method-options" placeholder="ZB">
                    <datalist id="method-options">
                        <option value="CFOP">
                        <option value="ZB">
                        <option value="ZZ">
                        <option value="Roux">
                        <option value="Petrus">
                        <option value="LEOR">
                    </datalist>
                </div>
            </div>
            <!-- NOTE: 盲拧专用字段——选中 3BLD/4BLD/5BLD/MBLD 时显示 -->
            <div id="rf-bld-row" class="recon-form-row" style="display:none">
                <div class="recon-form-group">
                    <label data-i18n-en="Exec Time" data-i18n-zh="执行时间">Exec Time</label>
                    <input type="text" id="rf-exec-time" placeholder="e.g. 14.36" data-i18n-placeholder-en="e.g. 14.36"
                        data-i18n-placeholder-zh="如 14.36">
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Memo Time" data-i18n-zh="记忆时间">Memo Time</label>
                    <input type="text" id="rf-memo-time" readonly tabindex="-1"
                        style="background:transparent; border-color:#444; color:#999">
                </div>
            </div>
            <!-- 比赛 + 日期 -->
            <div class="recon-form-row">
                <div class="recon-form-group" style="position:relative">
                    <label data-i18n-en="Competition" data-i18n-zh="比赛">Competition</label>
                    <input type="text" id="rf-comp" autocomplete="off">
                    <!-- NOTE: 选中比赛后显示富内容（日期+国旗+名称），隐藏 input -->
                    <div id="rf-comp-display" class="comp-display" style="display:none"></div>
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Date" data-i18n-zh="日期">Date</label>
                    <input type="text" id="rf-edit-date" placeholder="YYYY-MM-DD">
                </div>
            </div>
            <!-- 官方比赛 -->
            <div class="recon-form-group">
                <label><input type="checkbox" id="rf-official"> <span data-i18n-en="Official"
                        data-i18n-zh="官方比赛">Official</span></label>
            </div>
            <!-- 轮次 + 第几把 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Round" data-i18n-zh="轮次">Round</label>
                    <select id="rf-round">
                        <option value="">—</option>
                        <option value="R1">R1</option>
                        <option value="R2">R2</option>
                        <option value="R3">R3</option>
                        <option value="Fi">Fi</option>
                    </select>
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Solve #" data-i18n-zh="第几把">Solve #</label>
                    <select id="rf-solve-num">
                        <option value="">—</option>
                        <option value="1">#1</option>
                        <option value="2">#2</option>
                        <option value="3">#3</option>
                        <option value="4">#4</option>
                        <option value="5">#5</option>
                    </select>
                </div>
            </div>
            <!-- 组号 + 复盘日期 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Group" data-i18n-zh="组">Group</label>
                    <input type="text" id="rf-edit-groupId" placeholder="A/B/C/D/E">
                </div>
                <div class="recon-form-group">
                    <label data-i18n-en="Recon Date" data-i18n-zh="复盘日期">Recon Date</label>
                    <input type="text" id="rf-edit-reconDate" placeholder="YYYY-MM-DD">
                </div>
            </div>
            <!-- NOTE: 编辑专用字段容器 -->
            <div id="rf-edit-fields"></div>
            <!-- 魔方 + 复盘者 -->
            <div class="recon-form-row">
                <div class="recon-form-group">
                    <label data-i18n-en="Cube" data-i18n-zh="魔方">Cube</label>
                    <input type="text" id="rf-edit-cube">
                </div>
                <div class="recon-form-group" style="position:relative">
                    <label data-i18n-en="Reconer" data-i18n-zh="复盘者">Reconer</label>
                    <input type="text" id="rf-edit-reconer">
                    <!-- NOTE: 选中复盘者后显示富内容（旗帜+WCA ID+名字），隐藏 input -->
                    <div id="rf-reconer-display" class="person-display" style="display:none"></div>
                </div>
            </div>
            <!-- 视频链接 -->
            <div class="recon-form-group">
                <label data-i18n-en="Video URL" data-i18n-zh="视频链接">Video URL</label>
                <textarea id="rf-video-url" rows="2" style="overflow:hidden"
                    placeholder="YouTube / Bilibili URL (one per line)"
                    data-i18n-placeholder-en="YouTube / Bilibili URL (one per line)"
                    data-i18n-placeholder-zh="YouTube / Bilibili 链接（每行一个）"></textarea>
            </div>
            <!-- 备注 -->
            <div class="recon-form-group">
                <label data-i18n-en="Note" data-i18n-zh="备注">Note</label>
                <textarea id="rf-note" rows="1" style="overflow:hidden"></textarea>
            </div>
            <!-- NOTE: 仅管理员可见——允许管理员修改添加者 -->
            <div id="rf-adder-row" class="recon-form-group" style="display:none">
                <label data-i18n-en="Added By" data-i18n-zh="添加者">Added By</label>
                <input type="text" id="rf-edit-addedBy" autocomplete="one-time-code">
                <div id="rf-adder-display" class="person-display" style="display:none"></div>
            </div>
            <!-- NOTE: 校验错误提示容器（JS 动态填充） -->
            <div id="rf-errors" class="rf-errors" style="display:none"></div>
            <!-- 操作按钮 -->
            <div class="recon-form-actions">
                <a href="/recon/" class="recon-btn" data-i18n-en="Cancel" data-i18n-zh="取消">Cancel</a>
                <button type="submit" id="rf-submit-btn" class="recon-btn recon-btn-primary" data-i18n-en="Submit"
                    data-i18n-zh="提交">Submit</button>
            </div>
        </div> <!-- submit-col-meta -->
    </form>
</div>


<!-- NOTE: cubing/twisty 3D 动画播放器（懒加载） -->
<script type="module">
    let twistyPromise = null;
    function ensureTwisty() {
        if (!twistyPromise) {
            twistyPromise = import('https://cdn.cubing.net/v0/js/cubing/twisty')
                .then(mod => {
                    window.__TwistyPlayerCtor = mod.TwistyPlayer || mod.default;
                    return mod;
                })
                .catch(err => {
                    console.error('Twisty import failed:', err);
                    throw err;
                });
        }
        return twistyPromise;
    }
    window.ensureTwisty = ensureTwisty;
</script>
<script src="/recon/recon_utils.js"></script>
<script src="/recon/recon_stats.js"></script>
<script src="/recon/wca_auth.js"></script>
<script src="/recon/recon_api.js"></script>
<script src="/recon/recon_local_store.js"></script>
<script src="/recon/recon_alg_utils.js"></script>
<script src="/recon/submit/recon_submit_page.js" defer></script>
