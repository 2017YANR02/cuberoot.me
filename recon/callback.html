<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>WCA Login - Redirecting...</title>
    <style>
        body {
            background: #161616;
            color: #e0e0e0;
            font-family: 'Inter', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .callback-msg {
            text-align: center;
            font-size: 1.1rem;
        }

        .callback-msg .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="callback-msg" id="msg">
        <div class="spinner"></div>
        <div>正在登录 WCA...</div>
    </div>

    <!--
        NOTE: Implicit Grant 回调页
        token 在 URL hash 中（#access_token=xxx&state=yyy）
        解析 hash → 验证 state → 调用 /me → 存 sessionStorage → 跳回 /recon/
    -->
    <script>
        (function () {
            'use strict';

            var ME_URL = 'https://www.worldcubeassociation.org/api/v0/me';
            var msgEl = document.getElementById('msg');

            // NOTE: 解析 URL hash 参数
            var hash = window.location.hash.substring(1);
            var params = new URLSearchParams(hash);
            var accessToken = params.get('access_token');
            var state = params.get('state');
            var error = params.get('error');

            if (error) {
                showError('授权被拒绝: ' + error);
                return;
            }

            if (!accessToken) {
                showError('未获取到 access_token');
                return;
            }

            // NOTE: 验证 state 防 CSRF
            var savedState = sessionStorage.getItem('wca_oauth_state');
            if (!savedState || savedState !== state) {
                showError('OAuth state 不匹配，请重试');
                return;
            }
            sessionStorage.removeItem('wca_oauth_state');

            // NOTE: 用 token 调用 WCA /me API 获取用户信息
            fetch(ME_URL, {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            })
                .then(function (res) {
                    if (!res.ok) throw new Error('WCA /me failed: ' + res.status);
                    return res.json();
                })
                .then(function (data) {
                    var me = data.me;
                    var user = {
                        wcaId: me.wca_id,
                        name: me.name,
                        avatar: me.avatar && me.avatar.thumb_url ? me.avatar.thumb_url : '',
                        country: me.country_iso2 || ''
                    };

                    // NOTE: 存入 sessionStorage，recon 页面会读取
                    sessionStorage.setItem('wca_user', JSON.stringify(user));

                    // NOTE: 跳回 recon 页面
                    window.location.href = '/recon/';
                })
                .catch(function (err) {
                    showError('登录失败: ' + err.message);
                });

            function showError(msg) {
                msgEl.innerHTML = '<div class="error">❌ ' + msg + '</div>' +
                    '<div style="margin-top:12px"><a href="/recon/" style="color:#60a5fa">返回复盘页面</a></div>';
            }
        })();
    </script>
</body>

</html>
