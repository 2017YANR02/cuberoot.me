# Mira 镜界 → 反代到 Next standalone (:3003, systemd mira-next)。
# 当前为 HTTP-only 引导版:先让 nginx -t 通过 + 放行 acme-challenge,
# 以便 certbot 用 webroot 签发 mira.cuberoot.me 证书。
# 证书就绪后补 443 SSL server 块(照 next.cuberoot.me.conf),并把本块改成 301 → https。
server {
    listen 80;
    listen [::]:80;
    server_name mira.cuberoot.me;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
