# HTTP — for acme-challenge + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name next.cuberoot.me;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://next.cuberoot.me$request_uri;
    }
}

# HTTPS — reverse proxy to Next.js standalone on :3002
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name next.cuberoot.me;

    ssl_certificate /etc/letsencrypt/live/next.cuberoot.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/next.cuberoot.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;

    access_log /www/wwwlogs/next.cuberoot.me.log;
    error_log /www/wwwlogs/next.cuberoot.me.error.log;

    # acme-challenge for renewals
    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    # SharedArrayBuffer (FFmpeg WASM / @ffmpeg/ffmpeg) requires cross-origin
    # isolation. Next sets these via headers() but nginx must not strip them.
    proxy_pass_header Cross-Origin-Embedder-Policy;
    proxy_pass_header Cross-Origin-Opener-Policy;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Buffer settings appropriate for SPA HTML + Next chunks
        proxy_buffering off;
        proxy_read_timeout 60s;

        # WebSocket / streaming (Next HMR + SSE)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
