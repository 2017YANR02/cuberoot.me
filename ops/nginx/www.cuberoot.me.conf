# API 响应缓存(/v1/wca/* 只读 endpoint).max_size=1g 够大量切片变体.
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:20m max_size=1g inactive=24h use_temp_path=off;

# 给需要 SharedArrayBuffer (cubeopt-wasm) 的页面发 COOP/COEP — 进 cross-origin
# isolated context 才允许 SAB.其它路径 map 返空串,nginx 1.7.5+ 自动省略空值
# add_header,所以 26 个工具里只有 solver/analyzer 进 isolated;登录回调、recon
# 等保持普通,Safari 跨源 fetch /me 不用 SW 绕也能走通.用 $request_uri 而非
# $uri,因为 try_files 内部跳到 /index.html 时 $uri 会被改写.
map $request_uri $coop_header {
    default "";
    ~^/scramble/(solver|analyzer) "same-origin";
}
map $request_uri $coep_header {
    default "";
    ~^/scramble/(solver|analyzer) "require-corp";
}

# WebSocket upgrade — dev.cuberoot.me 反代 vite dev server 的 HMR ws 用。
# 普通 http 请求时 $http_upgrade 空 → $connection_upgrade = "close"(不强制 upgrade),
# ws 升级请求时 $http_upgrade = "websocket" → "upgrade"。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# /v1/analytics/* (pv + dwell) 是开放写入端点 — 每个客户端正常 1-3 r/s,burst 容忍刷新风暴.
# 10MB 内存 ≈ 16 万 IP 状态;限流后多余请求直接 429,不入 PG.
limit_req_zone $binary_remote_addr zone=analytics_zone:10m rate=5r/s;

server {
    listen 80;
    server_name cuberoot.me www.cuberoot.me;
    return 301 https://www.cuberoot.me$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cuberoot.me www.cuberoot.me;

    ssl_certificate /etc/letsencrypt/live/cuberoot.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cuberoot.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security max-age=15768000;
    # 仅 /scramble/(solver|analyzer) 命中 map 拿到非空值;其它路径空串 → nginx 不发.
    add_header Cross-Origin-Opener-Policy   $coop_header always;
    add_header Cross-Origin-Embedder-Policy $coep_header always;

    access_log /www/wwwlogs/www.cuberoot.me.log;
    error_log /www/wwwlogs/www.cuberoot.me.error.log;

    root /www/wwwroot/toolkit;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # certbot webroot challenge — webroot_path = /www/wwwroot/cuberoot-spa (per
    # /etc/letsencrypt/renewal/cuberoot.me.conf). 不加这条 SPA fallback 会吞掉 challenge。
    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    # /stats/comp/<slug>.json 由 dump_comps.yml 每天增量重写;100% 一致要求 client
    # 不能用启发式缓存(没 Cache-Control 时浏览器按 last-modified 推 max-age),
    # 强制每次 revalidate(304 几乎免费,变了才下新文件)。
    location ^~ /stats/comp/ {
        root /www/wwwroot/toolkit;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location ^~ /stats/ {
        root /www/wwwroot/toolkit;
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Phase 1b 临时:静态镜像测试入口 (cuberoot.me/blog-test/)。Phase 2 后删
    location ^~ /blog-test/ {
        alias /www/wwwroot/blog-static/;
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Phase 2 (2026-05-06): /blog/ 切静态。WP/PHP/MariaDB 不再被请求触发。
    # 旧 fastcgi 块见 .bak-2026-05-06-phase2;回滚 cp 即可。
    location ^~ /blog/ {
        alias /www/wwwroot/blog-static/;
        try_files $uri $uri/ $uri/index.html =404;
    }
    location = /blog {
        return 301 /blog/;
    }

    location ^~ /tools/ {
        root /www/wwwroot/toolkit;
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }


    location ~ ^/app/(.*)$ {
        return 301 /$1;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        access_log off;
    }

    location ~ /(\.user\.ini|\.ht|\.git|\.env|\.svn) {
        deny all;
    }
}

# api.cuberoot.me — 后端 API 子域,所有 SPA 跨域调 api.cuberoot.me/v1/*。
# 该子域 DNS 不分线路,始终指向本机。
# 注意:首次部署前必须先 `certbot certonly --webroot -w /www/wwwroot/cuberoot-spa -d api.cuberoot.me`
# 签发证书,否则 nginx -t 会失败导致 deploy_nginx.yml 回滚。
server {
    listen 80;
    server_name api.cuberoot.me;
    return 301 https://api.cuberoot.me$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.cuberoot.me;

    ssl_certificate /etc/letsencrypt/live/api.cuberoot.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cuberoot.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security max-age=15768000;

    access_log /www/wwwlogs/api.cuberoot.me.log;
    error_log /www/wwwlogs/api.cuberoot.me.error.log;

    # certbot webroot challenge — 复用主域 webroot
    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    # WCA 统计只读端点 —— 命中缓存绕过 PG,1 天内任意切片都秒返回
    location ~ ^/v1/wca/(historical-ranks|grand-slam|all-results|year-results|cohort-ranks|success-rate|all-events-done|sum-of-ranks) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 1d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # /comp/<slug> 数据端点 —— 由 upstream Cache-Control 驱动 TTL:
    # wca_db (过去比赛) → 1d immutable;实时源(cubing/wca_live/wca) → 30s.
    # 不写 proxy_cache_valid,让 nginx 按上游头自动决策;query string 进 key,
    # 所以 ?source=... / ?only=event:round 各自独立缓存,trimmed 端点天然受益.
    location ~ ^/v1/cubing-live/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Nemesizer 端点 —— in-memory 算法,每周才换数据,1 天 cache 覆盖典型用户行为。
    # whatif 单独 5min cache (server 端 Cache-Control 已设,这里跟随上游)。
    location ~ ^/v1/nemesizer/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 1d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # /v1/wca/recent-records —— WCA Live 近 10 天 WR/CR/NR 镜像,Hono 后台 60s 轮询。
    # nginx 缓 60s 兜底:多用户同时拉时上游 1 req/min。stale 在 WCA Live 挂时撑场。
    location = /v1/wca/recent-records {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # /v1/cn-comp-names —— 兜底新公示中国比赛的中文名 (静态 JSON 之外的 0~24h 窗口)。
    # 1h cache 平衡新鲜度 vs cubing.com 压力;use_stale 在上游挂时仍能服务。
    location = /v1/cn-comp-names {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # /v1/analytics/pv|dwell — 开放写入端点,nginx 层限流后再走 Hono.
    # burst=50 nodelay 允许短时尖峰 (SPA route 切换连发) 不排队,超出立刻 429.
    location ~ ^/v1/analytics/(pv|dwell)$ {
        limit_req zone=analytics_zone burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
    }

    # 全部转发给 Hono (CORS 在 server/index.ts 里处理),不在 nginx 加 add_header
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
    }
}

# dev.cuberoot.me — 开发预览,反代 PC vite dev server (经 frp 隧道 → 127.0.0.1:7100)。
# 不对生产用户开放;给作者本人手机/平板/外网测 UI 用。
server {
    listen 80;
    server_name dev.cuberoot.me;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://dev.cuberoot.me$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dev.cuberoot.me;

    ssl_certificate /etc/letsencrypt/live/dev.cuberoot.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.cuberoot.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;

    access_log /www/wwwlogs/dev.cuberoot.me.log;
    error_log /www/wwwlogs/dev.cuberoot.me.error.log;

    # acme-challenge 保留(续期走 webroot)
    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    # 反代到 PC vite dev server (经 frp 隧道暴露的本地端口)
    location / {
        proxy_pass http://127.0.0.1:7100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HMR WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_cache off;
        proxy_buffering off;

        # vite HMR 长连接:把超时拉长避免被 nginx 默认 60s 切断
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }
}
# blog.cuberoot.me — WordPress 静态归档 (2026-05-06 phase 2 freeze)
# DNS: blog CNAME → www.cuberoot.me,继承 www 境内境外分流。
# 境内 → 本机 nginx serve /www/wwwroot/blog-static (这里);
# 境外 → ruiminyan.github.io → GH Pages (RuiminYan/cuberoot-blog repo)。
# Cert: certbot --manual dns-01,90 天到期前手动 renew (acme-challenge webroot 留作后备)。
server {
    listen 80;
    server_name blog.cuberoot.me;
    return 301 https://blog.cuberoot.me$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name blog.cuberoot.me;

    ssl_certificate /etc/letsencrypt/live/blog.cuberoot.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.cuberoot.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security max-age=15768000;

    access_log /www/wwwlogs/blog.cuberoot.me.log;
    error_log /www/wwwlogs/blog.cuberoot.me.error.log;

    root /www/wwwroot/blog-static;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}

