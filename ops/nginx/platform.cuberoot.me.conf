# Cube Platform → 反代到 Next standalone (:3004, systemd platform-next)。
# HTTP: acme-challenge + 301 → https;HTTPS: 反代 :3004。

server {
    listen 80;
    listen [::]:80;
    server_name platform.cuberoot.me;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://platform.cuberoot.me$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name platform.cuberoot.me;

    ssl_certificate /etc/letsencrypt/live/platform.cuberoot.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/platform.cuberoot.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;

    access_log /www/wwwlogs/platform.cuberoot.me.log;
    error_log /www/wwwlogs/platform.cuberoot.me.error.log;

    # acme-challenge for renewals
    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 60s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
