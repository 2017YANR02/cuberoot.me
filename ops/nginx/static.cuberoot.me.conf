# static.cuberoot.me — replaces vite.cuberoot.me as the static-asset origin.
# Serves /tools/* (cstimer / solver / alg-trainers forks) and /stats/* (weekly
# WCA stats pipeline output) from /www/wwwroot/toolkit/, but nothing else —
# no SPA index.html fallback, no /blog, no /app rewrite. Vercel route handlers
# in client fall back here for assets that aren't bundled.
#
# Cert issued via acme.sh (HTTP-01). After this is live and verified,
# vite.cuberoot.me vhost + DNS are removed.

server {
    listen 80;
    listen [::]:80;
    server_name static.cuberoot.me;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://static.cuberoot.me$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name static.cuberoot.me;

    ssl_certificate /etc/letsencrypt/live/static.cuberoot.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/static.cuberoot.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security max-age=15768000;
    # CORS: Vercel functions (any *.vercel.app + main domain) need to fetch this.
    # Files are static, no credentials, so * is safe.
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

    access_log /www/wwwlogs/static.cuberoot.me.log;
    error_log /www/wwwlogs/static.cuberoot.me.error.log;

    root /www/wwwroot/toolkit;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    location ^~ /stats/comp/ {
        add_header Cache-Control "no-cache" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    location ^~ /stats/ {
        # 日更数据(stats 管线产出)。无 Cache-Control 时浏览器走启发式缓存(按 Last-Modified
        # 年龄猜,可能数小时不刷新 → 服务器已更新但用户看到旧数据)。给短 max-age + SWR:
        # 5min 内直接用缓存;之后先返旧、后台带 If-Modified-Since 校验,改了才全量拉(否则 304)。
        # 注意:^~ 前缀命中即不走下方 `~* \.json$` 正则块,故这里必须显式发头。
        # 另:出现任一 add_header 即断掉 server 级头继承,故 CORS 在此重申(同 /stats/comp/)。
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=86400" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    location ^~ /tools/ {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|json)$ {
        expires 7d;
        access_log off;
    }

    location ~ /(\.user\.ini|\.ht|\.git|\.env|\.svn) {
        deny all;
    }

    # Anything not under /tools or /stats: 404. No SPA fallback here on purpose.
    location / {
        return 404;
    }
}
