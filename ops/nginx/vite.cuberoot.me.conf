# vite.cuberoot.me — 旧 Vite SPA 兜底子域,Phase 4 主域切 Next 后保留作回滚 + 对比。
# 内容跟 www.cuberoot.me 主块完全一致(root /www/wwwroot/toolkit),只换 server_name。
# 主域 Next 跑炸时:DNS 不动,把 www.cuberoot.me.conf 的 location / 临时改回
# `try_files $uri $uri/ /index.html;` reload 即可(配置仍是 vite 的)。
#
# 该 vhost 不参与 COOP/COEP map($coop_header / $coep_header 来自 www.cuberoot.me.conf
# 顶部 — nginx 全局生效),所以 /scramble/solver|analyzer 仍能拿到 SAB。

server {
    listen 80;
    listen [::]:80;
    server_name vite.cuberoot.me;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://vite.cuberoot.me$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vite.cuberoot.me;

    ssl_certificate /etc/letsencrypt/live/vite.cuberoot.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vite.cuberoot.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security max-age=15768000;
    # 跟主域同一对 map → 仅 /scramble/(solver|analyzer) 进 isolated context
    add_header Cross-Origin-Opener-Policy   $coop_header always;
    add_header Cross-Origin-Embedder-Policy $coep_header always;

    access_log /www/wwwlogs/vite.cuberoot.me.log;
    error_log /www/wwwlogs/vite.cuberoot.me.error.log;

    root /www/wwwroot/toolkit;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/cuberoot-spa;
        default_type "text/plain";
        try_files $uri =404;
    }

    location ^~ /stats/comp/ {
        root /www/wwwroot/toolkit;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location ^~ /stats/ {
        root /www/wwwroot/toolkit;
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    location ^~ /blog/ {
        alias /www/wwwroot/blog-static/;
        try_files $uri $uri/ $uri/index.html =404;
    }
    location = /blog {
        return 301 /blog/;
    }

    location ^~ /tools/ {
        root /www/wwwroot/toolkit;
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    location ~ ^/app/(.*)$ {
        return 301 /$1;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        access_log off;
    }

    location ~ /(\.user\.ini|\.ht|\.git|\.env|\.svn) {
        deny all;
    }
}
