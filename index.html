<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title data-i18n="index.title">Rubik's Cube Toolkit</title>
    <meta name="description" content="Rubik's Cube solvers, trainers, and WCA statistics — all in one place.">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MXJH30352W"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-MXJH30352W');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/card.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            /* NOTE: 亮点粒子背景，增加视觉层次 */
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(90, 90, 200, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(200, 90, 90, 0.06) 0%, transparent 50%);
        }

        /* NOTE: 确保内容在粒子 Canvas (z-index:0) 上方 */
        .landing-title,
        .landing-subtitle,
        .cards-container,
        .footer {
            position: relative;
            z-index: 1;
        }

        .landing-title {
            font-size: clamp(1.5rem, 4vw, 2.4rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #e0e0ff 0%, #ffffff 50%, #ffe0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .landing-subtitle {
            font-size: clamp(0.85rem, 2vw, 1rem);
            color: #888;
            text-align: center;
            margin-bottom: 3rem;
            font-weight: 400;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            max-width: 720px;
            width: 100%;
        }

        @media (max-width: 600px) {
            .cards-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: #ffffff;
        }

        /* NOTE: 各卡片悬浮时的独特颜色 */
        .card-solver {
            --card-gradient: linear-gradient(90deg, #6366f1, #8b5cf6, #a78bfa);
        }

        .card-stats {
            --card-gradient: linear-gradient(90deg, #f59e0b, #ef4444, #ec4899);
        }

        .card-solver:hover {
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.12);
        }

        .card-stats:hover {
            border-color: rgba(245, 158, 11, 0.4);
            box-shadow: 0 8px 32px rgba(245, 158, 11, 0.12);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .card-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #aaa;
            text-align: center;
            line-height: 1.5;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #555;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .footer a {
            color: #777;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #aaa;
        }

        /* NOTE: 语言切换按钮样式（🌐 + 目标语言文字） */
        .lang-toggle {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            border: 1px solid #444;
            background: transparent;
            color: #999;
            font-size: 0.75rem;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            user-select: none;
        }

        .lang-toggle:hover {
            color: #e8eeff;
            border-color: rgba(100, 100, 180, 0.5);
            background: rgba(100, 100, 180, 0.12);
        }

        .lang-toggle .globe-icon {
            font-size: 0.9rem;
            line-height: 1;
        }
    </style>
</head>

<body>
    <!-- NOTE: 粒子动画背景 Canvas，全屏覆盖但不拦截点击 -->
    <canvas id="particles-bg"
        style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

    <h1 class="landing-title" data-i18n="index.title">Rubik's Cube Toolkit</h1>
    <p class="landing-subtitle" data-i18n="index.subtitle">Solvers, trainers, and statistics</p>

    <div class="cards-container">
        <a href="solver/" class="glass-card card card-solver" id="card-solver">
            <div class="card-icon">🧩</div>
            <div class="card-name" data-i18n="index.solver">Solver</div>
            <div class="card-desc" data-i18n="index.solver_desc">Cross, XCross, EOCross, Free Pair, Pseudo F2L, Last
                Layer, and trainers</div>
        </a>

        <a href="stats/" class="glass-card card card-stats" id="card-stats">
            <div class="card-icon">📊</div>
            <div class="card-name" data-i18n="index.wca_stats">WCA Stats</div>
            <div class="card-desc" data-i18n="index.stats_desc">60+ statistics from the WCA database, updated weekly
            </div>
        </a>
    </div>

    <div class="footer">
        <span>v1.4.1</span>
        <a href="https://github.com/RuiminYan/ruiminyan.github.io" target="_blank" rel="noopener noreferrer">GitHub</a>
        <div class="lang-toggle" data-i18n-toggle="true" onclick="I18n.toggle()">
            <span class="globe-icon">🌐</span>
            <span class="lang-label">中文</span>
        </div>
    </div>

    <script src="assets/js/particles.js" defer></script>
    <script src="i18n/i18n.js" defer></script>
    <script src="sw-register.js" defer></script>
</body>

</html>
