<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- favicon href 由 utils/theme.ts 跟 effectiveTheme 动态切换 (Chrome 对 media query favicon 支持不稳) -->
    <link id="app-favicon" rel="icon" type="image/png" href="/icons/CubeRoot.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- NOTE: PWA — 添加到主屏幕图标 + manifest -->
    <link rel="apple-touch-icon" href="/icons/CubeRoot.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2d2b2a" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- 预热到 API 主机的 TCP+TLS,后续跨域 fetch 跳过 ~2s 握手 -->
    <link rel="preconnect" href="https://api.cuberoot.me" crossorigin />
    <title>CubeRoot</title>
    <!-- 字体走 src/fonts.css 自托管(woff2 在 public/fonts/,见 fonts.css) -->
    <!-- 关键字体预加载 — 正文 Inter 400 / 500 加快首屏 -->
    <link rel="preload" href="/fonts/inter-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin-500-normal.woff2" as="font" type="font/woff2" crossorigin />
    <!-- NOTE: WCA 项目图标已改用内联 SVG (components/EventIcon),不再需要字体 -->
    <!-- NOTE: 国旗 CSS 由 src/index.css 本地 import（见 flag-icons npm 包），无需 CDN -->

    <!-- NOTE: GitHub Pages SPA 路由恢复 — 404.html 重定向后还原原始路径 -->
    <script>
      (function(){
        var r = sessionStorage.getItem('spa-redirect');
        if (r) { sessionStorage.removeItem('spa-redirect'); history.replaceState(null, '', r); }
      })();
    </script>
    <script type="module" crossorigin src="/_assets/index-BsyZoDzA.js"></script>
    <link rel="stylesheet" crossorigin href="/_assets/LangToggle-DvDLG7_x.css">
    <link rel="stylesheet" crossorigin href="/_assets/ThemeToggle-DTgjJ-uk.css">
    <link rel="stylesheet" crossorigin href="/_assets/CompPicker-DkHhwvRl.css">
    <link rel="stylesheet" crossorigin href="/_assets/EventIcon-DDAr2ld1.css">
    <link rel="stylesheet" crossorigin href="/_assets/HeaderToggles-BlWskbED.css">
    <link rel="stylesheet" crossorigin href="/_assets/RecordBadge-BfWLQrhz.css">
    <link rel="stylesheet" crossorigin href="/_assets/WcaEventSelector-D7Bfau3e.css">
    <link rel="stylesheet" crossorigin href="/_assets/index-BBNswZSU.css">
    <link rel="stylesheet" crossorigin href="/_assets/comp-DSvi3yOG.css">
  </head>

</html>
