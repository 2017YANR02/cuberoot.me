<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title data-i18n="index.title">Rubik's Cube Toolkit</title>
    <meta name="description" content="Rubik's Cube solvers, trainers, and WCA statistics — all in one place.">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MXJH30352W"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-MXJH30352W');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            /* NOTE: 亮点粒子背景，增加视觉层次 */
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(90, 90, 200, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(200, 90, 90, 0.06) 0%, transparent 50%);
        }

        .landing-title {
            font-size: clamp(1.5rem, 4vw, 2.4rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #e0e0ff 0%, #ffffff 50%, #ffe0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .landing-subtitle {
            font-size: clamp(0.85rem, 2vw, 1rem);
            color: #888;
            text-align: center;
            margin-bottom: 3rem;
            font-weight: 400;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            max-width: 720px;
            width: 100%;
        }

        @media (max-width: 600px) {
            .cards-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        .card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            background: rgba(30, 30, 50, 0.6);
            border: 1px solid rgba(100, 100, 180, 0.2);
            text-decoration: none;
            color: #ffffff;
            transition: transform 0.25s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            /* NOTE: 使用 backdrop-filter 实现毛玻璃效果 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .card::before {
            /* NOTE: 顶部渐变光带，各卡片颜色不同以区分 */
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 16px 16px 0 0;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-solver::before {
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #a78bfa);
        }

        .card-stats::before {
            background: linear-gradient(90deg, #f59e0b, #ef4444, #ec4899);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(130, 130, 220, 0.4);
            box-shadow: 0 8px 32px rgba(80, 80, 160, 0.15);
        }

        .card-solver:hover {
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.12);
        }

        .card-stats:hover {
            border-color: rgba(245, 158, 11, 0.4);
            box-shadow: 0 8px 32px rgba(245, 158, 11, 0.12);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .card-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #aaa;
            text-align: center;
            line-height: 1.5;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #555;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .footer a {
            color: #777;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #aaa;
        }

        /* NOTE: 语言切换按钮样式 */
        .lang-toggle {
            display: inline-flex;
            gap: 0;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #444;
        }

        .lang-toggle button {
            background: transparent;
            border: none;
            color: #777;
            padding: 3px 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .lang-toggle button.active {
            background: rgba(100, 100, 180, 0.3);
            color: #fff;
        }

        .lang-toggle button:hover:not(.active) {
            color: #aaa;
        }
    </style>
</head>

<body>
    <h1 class="landing-title" data-i18n="index.title">Rubik's Cube Toolkit</h1>
    <p class="landing-subtitle" data-i18n="index.subtitle">Solvers, trainers, and statistics</p>

    <div class="cards-container">
        <a href="solver.html" class="card card-solver" id="card-solver">
            <div class="card-icon">🧩</div>
            <div class="card-name" data-i18n="index.solver">Solver</div>
            <div class="card-desc" data-i18n="index.solver_desc">Cross, XCross, EOCross, Free Pair, Pseudo F2L, Last
                Layer, and trainers</div>
        </a>

        <a href="stats/" class="card card-stats" id="card-stats">
            <div class="card-icon">📊</div>
            <div class="card-name" data-i18n="index.wca_stats">WCA Stats</div>
            <div class="card-desc" data-i18n="index.stats_desc">60+ statistics from the WCA database, updated weekly
            </div>
        </a>
    </div>

    <div class="footer">
        <a href="https://github.com/RuiminYan/ruiminyan.github.io" target="_blank" rel="noopener noreferrer">GitHub</a>
        <div class="lang-toggle">
            <button data-i18n-toggle="en" onclick="I18n.setLocale('en')">EN</button>
            <button data-i18n-toggle="zh" onclick="I18n.setLocale('zh')">中文</button>
        </div>
    </div>

    <script src="src/i18n/i18n.js" defer></script>
    <script src="sw-register.js" defer></script>
</body>

</html>
