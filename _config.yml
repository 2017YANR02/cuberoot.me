# Jekyll 网站构建配置：GitHub Pages 用此文件决定如何生成静态站点
plugins:
  - jekyll-sitemap
  - jekyll-optional-front-matter

# NOTE: 排除 trainer/ React monorepo 源码，由独立 CI 构建部署
# NOTE: 排除 _assets/（Vite 产物），由 deploy_trainer CI 直接 commit
exclude:
  - trainer
  - _assets

# stats 子目录的 Markdown 由 GitHub Actions 自动生成
# recon 已迁移到 legacy/recon/，由 legacy 下继承 default layout
defaults:
  - scope:
      path: "stats"
    values:
      layout: "default"
  - scope:
      path: "legacy/recon"
    values:
      layout: "default"

# NOTE: 关闭 Kramdown SmartyPants，保持直引号 ' (U+0027)
# 弯引号 ' (U+2019) 会导致 i18n.js 文本匹配 "Rubik's" 失败
kramdown:
  smart_quotes: ["apos", "apos", "quot", "quot"]
