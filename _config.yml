plugins:
  - jekyll-sitemap
  - jekyll-optional-front-matter

# stats 子目录的 Markdown 由 GitHub Actions 自动生成
defaults:
  - scope:
      path: "stats"
    values:
      layout: "default"

# NOTE: 关闭 Kramdown SmartyPants，保持直引号 ' (U+0027)
# 弯引号 ' (U+2019) 会导致 i18n.js 文本匹配 "Rubik's" 失败
kramdown:
  smart_quotes: ["apos", "apos", "quot", "quot"]
