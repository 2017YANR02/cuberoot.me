# SQ1 solver regression — guards the MITM slash machinery (decide_t / fast_key / slash
# edge model) that closed the last 10 slash monsters to 0 residual. Previously the only
# validation was a one-off manual run (SQ1_SLASH_OPTIMAL.md §6.4); this pins it in CI.
# The test uses ZERO disk tables (pure in-memory BFS over Sq1State), so it's fast and
# needs no 13GB/34GB artifacts. Scoped to `cargo test --bin sq1_slash_mitm` only — does
# not run the heavy lib oracle tests (which build GB-scale tables).
name: solver test

on:
  push:
    branches: [main]
    paths:
      - 'solver/src/**'
      - 'solver/Cargo.toml'
      - '.github/workflows/solver_test.yml'
  pull_request:
    paths:
      - 'solver/src/**'
      - 'solver/Cargo.toml'
  workflow_dispatch:

concurrency:
  group: solver-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sq1-slash-mitm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: cargo test (sq1_slash_mitm — decide_t radius / fast_key == canon_key / slash involution)
        working-directory: solver
        run: cargo test --bin sq1_slash_mitm
