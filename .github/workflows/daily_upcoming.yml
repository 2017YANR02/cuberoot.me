# 每天自动刷新 Upcoming Comps 数据（WCA + cubing.com CN 比赛）
# 约 15 分钟，月耗 450 分钟，远低于 GitHub Actions 免费额度 2000 分钟/月
name: Daily Upcoming Comps Refresh

on:
  schedule:
    # 每天 01:00 北京时间 = UTC 17:00
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Refresh upcoming comps (WCA + CN)
        run: python scripts/fetch_upcoming_comps.py --refresh

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add stats/upcoming_comps.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily refresh upcoming comps [skip ci]"
            git pull --rebase origin main
            git push
          fi
