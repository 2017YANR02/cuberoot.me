# 每天刷新 Upcoming Comps 数据（WCA + cubing.com CN 比赛）
# 约 15 分钟，月耗 450 分钟
name: Update Upcoming Comps

on:
  schedule:
    # UTC 20:00
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      - name: Fetch upcoming comps (WCA + CN)
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/fetch_upcoming_comps.ts --refresh

      - name: Update comp names zh
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/fetch_comp_names_zh.ts --refresh

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add stats/upcoming_comps.json stats/all_upcoming_comps.json stats/cn_upcoming_registrations.json stats/comp_names_zh.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update upcoming comps + comp names zh [skip ci]"
            git pull --rebase origin main
            git push
          fi
