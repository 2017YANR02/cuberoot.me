# 每天刷新 Upcoming Comps 数据（WCA + cubing.com CN 比赛）
# 约 15 分钟，月耗 450 分钟
name: Update Upcoming Comps

on:
  schedule:
    # UTC 20:00
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - name: Install dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      # WCA 对 GH runner IP 段返 403;经自有服务器代理出网(IP 未被封)。
      # 见 packages/server/src/routes/wca_proxy.ts;secret 存 repo secret WCA_PROXY_SECRET。
      - name: Fetch upcoming comps (WCA + CN)
        working-directory: core/packages/stats-build
        env:
          WCA_API_BASE: https://api.cuberoot.me/v1/wca-proxy/api/v0
          WCA_PROXY_SECRET: ${{ secrets.WCA_PROXY_SECRET }}
        run: npx tsx src/bin/fetch_upcoming_comps.ts --refresh

      - name: Update comp names zh
        working-directory: core/packages/stats-build
        env:
          WCA_API_BASE: https://api.cuberoot.me/v1/wca-proxy/api/v0
          WCA_PROXY_SECRET: ${{ secrets.WCA_PROXY_SECRET }}
        run: npx tsx src/bin/fetch_comp_names_zh.ts --refresh

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add stats/upcoming_comps.json stats/all_upcoming_comps.json stats/cn_upcoming_registrations.json stats/comp_names_zh.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # commit 带 [skip ci] 避免触发 deploy_next/test 等重 workflow;
            # 但这样也掐死了 sync_toolkit(靠 push+stats/** 触发),upcoming 数据永远上不了 static。
            # 故 push 后显式触发 sync_toolkit 把新 stats/*.json rsync 到静态服务器。
            git commit -m "chore: update upcoming comps + comp names zh [skip ci]"
            git pull --rebase origin main
            git push
            gh workflow run sync_toolkit.yml
          fi
