# GitHub Actions CI 配置：每周自动下载 WCA 数据库、计算统计、抓取 Upcoming Comps、推送更新
name: Update Stats

on:
  push:
    paths:
      - 'core/packages/stats-build/src/**/*.ts'
  schedule:
    # UTC 每天 20:00 — WCA dump 上游天更
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      stats_filter:
        description: 'Comma-separated stat IDs to compute (empty = all). Example: wr_metric,wr_aoxr'
        required: false
        default: ''

jobs:
  # 推送代码时只做语法检查（~30秒），快速发现错误
  syntax-check:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install stats-build dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      - name: TypeScript compile check
        working-directory: core/packages/stats-build
        run: npx tsc --noEmit

  # 定时/手动触发时才跑完整计算（~2h）
  build:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # NOTE: 确保输出中文不乱码（ubuntu 默认 locale 可能非 UTF-8）
    env:
      LANG: en_US.UTF-8
    permissions:
      contents: write
      actions: write
    steps:
      # NOTE: 删除 runner 上不需要的预装软件，腾出 ~10GB 磁盘
      # 防止 MySQL 临时文件撑满 /tmp (errno 28: No space left on device)
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: actions/checkout@v4

      - name: Activate MySQL
        run: sudo systemctl start mysql.service

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install stats-build dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      # nemesizer.ts imports @cuberoot/shared/nemesizer-format whose `node`
      # condition resolves to dist/nemesizer_format.js; tsx runs in Node so
      # the dist must exist before any tsx step that crosses that subpath.
      - name: Build shared package
        working-directory: core
        run: pnpm --filter @cuberoot/shared build

      - name: Create stats output directory
        run: mkdir -p stats

      # NOTE: 写入 CI 专用数据库配置（TS database.ts 从此文件读取凭据）
      - name: Setup database config
        run: |
          printf 'database: "wca_developer_database"\nusername: "root"\npassword: "root"\nhost: "127.0.0.1"' > core/packages/stats-build/database.yml

      # NOTE: TS 管线——完全替代 Ruby
      - name: Download and import WCA database
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/update_database.ts

      # NOTE: 前置 EXPLAIN 校验所有 stat SQL —— 任何语法错(MySQL 保留字/列名错等)
      # 在几秒内 fail-fast，避免等 compute_all 跑到中途才发现
      - name: Validate stat queries (EXPLAIN preflight)
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/validate_queries.ts

      - name: Compute all statistics
        working-directory: core/packages/stats-build
        env:
          STATS_FILTER: ${{ github.event.inputs.stats_filter || '' }}
          NODE_OPTIONS: '--expose-gc --max-old-space-size=6144'
        run: npx tsx src/bin/compute_all.ts

      - name: Generate WR IDs for calc page
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/gen_wr_ids.ts

      - name: Generate persons search index
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/gen_persons_search.ts

      - name: Generate nemesizer dataset
        working-directory: core/packages/stats-build
        env:
          NODE_OPTIONS: '--expose-gc --max-old-space-size=6144'
        run: npx tsx src/bin/nemesizer.ts

      - name: Compute index
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/compute_index.ts

      - name: Generate all past competitions JSON
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/gen_all_comps.ts

      - name: Generate /wca/prediction historical trends JSON
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/prediction_build.ts

      - name: Generate 3x3 WR history JSON
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/wr333_history_build.ts

      - name: Generate competition records JSON
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/gen_comp_records.ts

      # Per-event scramble move-length distribution (/scramble/stats length tab).
      # Streams the `scrambles` table (added to REQUIRED_TABLES) — no extra download.
      - name: Generate scramble length distribution JSON
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/build_scramble_lengths.ts

      - name: Generate lookup data (person_countries + comp_countries)
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/gen_lookup_data.ts

      - name: Build historical records JSON (WR/CR/NR)
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/records_build.ts

      # 性别(女子/男子)历史纪录进程 — /wca/records 性别下拉数据源(world + 6 大洲)
      - name: Build gendered historical records JSON (women/men)
        working-directory: core/packages/stats-build
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npx tsx src/bin/records_gender_build.ts

      # upcoming comps 抓取已交给独立的 update_upcoming.yml(每天 20:00 同跑,专属 owner):
      # 它产 upcoming_comps.json / all_upcoming_comps.json / cn_upcoming_registrations.json + comp_names_zh.json
      # 并触发 sync_toolkit。曾经这里也跑一遍 fetch_upcoming_comps,与之撞车(同分钟提交同一批文件 →
      # rebase 冲突),且依赖 WCA 代理:WCA 封 runner IP 时脚本 process.exit(1) 会在下面 historical_ranks /
      # sor / wca_stats_extra 之前就 abort 掉整个 2h 关键管道。故从 stats.yml 移除,只留 update_upcoming.yml。

      # ── 历史排名 snapshot:复用上面已经导入的 MySQL,算完 scp + ssh 灌进 prod PG ──
      - name: Build historical ranks snapshot
        working-directory: core/packages/stats-build
        env:
          NODE_OPTIONS: '--expose-gc --max-old-space-size=12288'
        run: npx tsx src/bin/historical_ranks_build.ts

      # SOR(名次和)随时间演化:读上一步落盘的 snapshot TSV → stats/sor_over_time/*.json(commit)
      # + sor_historical_best.copy.tsv(追加进 load.sql,随 historical_ranks 同一 scp+apply 灌库).
      - name: Build SOR over-time JSON + best-rank
        working-directory: core/packages/stats-build
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npx tsx src/bin/sor_over_time_build.ts

      - name: Setup SSH for historical ranks deploy
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/hr_id
          chmod 600 ~/.ssh/hr_id
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload historical ranks TSVs to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        working-directory: core/packages/stats-build/output/historical_ranks
        run: |
          ssh -T -n -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/hr_id "$DEPLOY_USER@$DEPLOY_HOST" 'mkdir -p /tmp/wca_import && rm -rf /tmp/wca_import/*'
          scp -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/hr_id load.sql wca_continents.copy.tsv wca_countries.copy.tsv wca_persons.copy.tsv \
            historical_ranks_snapshot.copy.tsv historical_ranks_monthly_snapshot.copy.tsv historical_best_ranks.copy.tsv \
            sor_historical_best.copy.tsv \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/wca_import/"

      - name: Apply historical ranks on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        # NOTE: -T -n + ServerAlive 防 ssh 半挂死(2026-05-10 run #222 远端 apply 早完成,
        # 客户端等 FIN 卡 2h+)。同 wca_stats_extra apply。
        run: ssh -T -n -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/hr_id "$DEPLOY_USER@$DEPLOY_HOST" '/usr/local/bin/apply_load.sh /tmp/wca_import historical_ranks_apply'

      # ── WCA stats extra:6 个 cubing.pro 风格 stats(grand_slam / all_results 等) ──
      # 增量:先拉服务器现有 per-comp 指纹,builder 只重灌指纹变动比赛的 wca_results_flat 行
      # (不再每天全量 DROP+重建翻倍撑爆磁盘).拉取失败/脚本未部署 → 空文件 → builder 退回全量(安全兜底).
      - name: Fetch current fingerprints (incremental wca_results_flat)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -T -n -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/hr_id \
            "$DEPLOY_USER@$DEPLOY_HOST" '/usr/local/bin/dump_fingerprints.sh' \
            > "$GITHUB_WORKSPACE/core/packages/stats-build/prev_fp.tsv" 2>/dev/null || true
          echo "fetched $(wc -l < "$GITHUB_WORKSPACE/core/packages/stats-build/prev_fp.tsv" 2>/dev/null || echo 0) fingerprint rows"

      - name: Build WCA stats extra
        working-directory: core/packages/stats-build
        env:
          NODE_OPTIONS: '--expose-gc --max-old-space-size=12288'
          # builder 清空 output/ 目录,故旧指纹放在 package 根而非 output 内.缺此文件 → 全量模式.
          PREV_FINGERPRINTS: ${{ github.workspace }}/core/packages/stats-build/prev_fp.tsv
        run: npx tsx src/bin/wca_stats_extra_build.ts

      - name: Upload WCA stats extra TSVs to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        working-directory: core/packages/stats-build/output/wca_stats_extra
        # scp 整个 output 目录:增量 / 全量产出的文件集不同
        # (全量含 wca_results_flat.copy.tsv;增量含 wca_results_flat_delta.tsv + wca_results_flat_del.txt).
        run: |
          ssh -T -n -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/hr_id "$DEPLOY_USER@$DEPLOY_HOST" 'mkdir -p /tmp/wca_stats_extra && rm -rf /tmp/wca_stats_extra/*'
          scp -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/hr_id ./* \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/wca_stats_extra/"

      - name: Apply WCA stats extra on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        # NOTE: -T -n + ServerAlive 防 ssh 半连卡死(2026-05-09 一次 FIN 丢了卡 1h+);
        # 远端正常退出 → 立刻断;sshd 没回 FIN → 90s 内 keepalive 探活失败强断.
        run: ssh -T -n -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/hr_id "$DEPLOY_USER@$DEPLOY_HOST" '/usr/local/bin/apply_load.sh /tmp/wca_stats_extra wca_stats_extra_apply'

      # 重灌后 nginx 24h api_cache 仍持着老数据 → 清掉,新 id 排序立刻生效
      # (memory: reference_nginx_proxy_cache.md)
      - name: Purge nginx api cache
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: ssh -T -n -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/hr_id "$DEPLOY_USER@$DEPLOY_HOST" 'rm -rf /var/cache/nginx/api/* && nginx -s reload'

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # NOTE: 清理已被合并到聚合页面的旧 .md 文件
          for f in wr_single_history wr_average_history \
                   wr_bao5 wr_wao5 wr_mo5 wr_bpa wr_wpa \
                   wr_median wr_best_counting wr_worst_counting wr_worst \
                   wr_variance wr_best_average_ratio \
                   wr_ao1r wr_ao2r wr_ao3r wr_ao4r \
                   best_first_average best_first_single; do
              rm -f "stats/${f}.md"
          done
          git add -A stats/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update WCA statistics [skip ci]"
            # NOTE: 本 workflow 不再产 upcoming_comps.json(已归 update_upcoming.yml),但 rebase 仍可能
            # 撞到别的并发自动 commit 而冲突;CI 刚生成的数据是最新的，冲突时直接用我们的版本（rebase 中 --theirs 指被 rebase 的 commit）
            # GIT_EDITOR=true 让 rebase --continue 不弹编辑器，否则 CI 上会失败导致整个 commit 被 --skip 丢弃
            if ! git pull --rebase origin main; then
              echo "Rebase conflict detected, resolving with ours..."
              git diff --name-only --diff-filter=U | while read f; do
                git checkout --theirs "$f"
                git add "$f"
              done
              GIT_EDITOR=true git rebase --continue
            fi
            git push
            # commit 带 [skip ci](避开 deploy_next/test 等重 workflow),但这样也掐死了靠 push+stats/**
            # 触发的 sync_toolkit → 日更 stats 永远上不了 static(过去比赛双轮等数据隔天才同步)。
            # 故 push 后显式触发一次 sync_toolkit,把新 stats/*.json rsync 到静态服务器(同 update_upcoming.yml)。
            gh workflow run sync_toolkit.yml
          fi
