# GitHub Actions CI 配置：每周自动下载 WCA 数据库、计算统计、抓取 Upcoming Comps、推送更新
name: Update Stats

on:
  push:
    paths:
      - '_stats_build/**/*.rb'
  schedule:
    # 每周一凌晨 4:00（北京时间）= UTC 周日 20:00
    - cron: '0 20 * * 0'
  workflow_dispatch:
    inputs:
      stats_filter:
        description: 'Comma-separated stat IDs to compute (empty = all). Example: wr_metric,wr_aoxr'
        required: false
        default: ''

jobs:
  # 推送代码时只做语法检查（~30秒），快速发现错误
  syntax-check:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Check Ruby syntax
        run: find _stats_build -name '*.rb' -exec ruby -c {} +

  # 定时/手动触发时才跑完整计算（~47分钟）
  build:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # NOTE: 确保 Ruby File.write 输出中文不乱码（ubuntu 默认 locale 可能非 UTF-8）
    env:
      LANG: en_US.UTF-8
    permissions:
      contents: write
    steps:
      # NOTE: 删除 runner 上不需要的预装软件，腾出 ~10GB 磁盘
      # 防止 MySQL 临时文件撑满 /tmp (errno 28: No space left on device)
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: actions/checkout@v4

      - name: Activate MySQL
        run: sudo systemctl start mysql.service

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: _stats_build

      - name: Create stats output directory
        run: mkdir -p stats

      - name: Setup database
        working-directory: _stats_build
        run: |
          ruby bin/init.rb
          printf 'database: "wca_statistics"\nusername: "root"\npassword: "root"' > database.yml
          ruby bin/update_database.rb

      - name: Compute all statistics
        working-directory: _stats_build
        env:
          STATS_FILTER: ${{ github.event.inputs.stats_filter || '' }}
        run: ruby bin/compute_all.rb

      - name: Generate WR JSON for calc page
        working-directory: _stats_build
        run: ruby bin/gen_wr_json.rb

      - name: Compute index
        working-directory: _stats_build
        run: ruby bin/compute_index.rb

      - name: Fetch upcoming comps
        run: python scripts/fetch_upcoming_comps.py --refresh

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # NOTE: 清理已被合并到聚合页面的旧 .md 文件
          for f in wr_single_history wr_average_history \
                   wr_bao5 wr_wao5 wr_mo5 wr_bpa wr_wpa \
                   wr_median wr_best_counting wr_worst_counting wr_worst \
                   wr_variance wr_best_average_ratio \
                   wr_ao1r wr_ao2r wr_ao3r wr_ao4r \
                   best_first_average best_first_single; do
            rm -f "stats/${f}.md"
          done
          git add -A stats/ calc/data/wr.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update WCA statistics [skip ci]"
            git pull --rebase origin main
            git push
          fi
