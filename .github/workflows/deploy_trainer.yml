# 训练器前端部署（GitHub Pages）
# 仅当 trainer/ 源码有变更时触发
# 构建 Vite 产物 → 提交到 trainer_app/ → GitHub Pages + deploy_mirror 自动 serve
name: Deploy Trainer

on:
  push:
    branches: [main]
    paths:
      - 'trainer/**'
      - '!trainer_app/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: trainer/pnpm-lock.yaml

      # 安装依赖
      - name: Install dependencies
        working-directory: trainer
        run: pnpm install --frozen-lockfile

      # 构建前端
      - name: Build client
        working-directory: trainer
        run: pnpm --filter @cuberoot/client build

      # 将 dist/ 产物复制到仓库根目录的 trainer_app/
      # Jekyll 不排除此目录，会直接当静态文件 serve
      - name: Copy dist to trainer_app/
        run: |
          rm -rf trainer_app
          cp -r trainer/packages/client/dist trainer_app

      # 提交并推送（deploy_mirror.yml 会自动同步到国内镜像）
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trainer_app/
          # 仅在有变化时才提交
          git diff --cached --quiet || git commit -m "ci: rebuild trainer_app from trainer/"
          git pull --rebase origin main
          git push
