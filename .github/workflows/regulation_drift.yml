# 月度检测 WCA 官方规则是否变化(thewca/wca-regulations official 分支),并分两条处理:
#   1) 逐字全文镜像 /regulation/full —— 机器逐字生成,无需人工转述,所以**自动重建并发 PR**
#      (合并即上线最新版;reg-check / build-reg-clauses 只用 node 内置 + fetch,无需 install)。
#   2) 图文转述版章节 /regulation/<slug> —— 有版权改写成分,只能人工重写 → 仍开/更新带 diff 的 issue。
# 官方发布不按固定节奏(近年有 2025-07-17 合并版、2026-04-01),故按月检查而非盯日期。
name: WCA Regulation Drift

on:
  schedule:
    # 每月 1 号 08:00 UTC
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: core
          filter: blob:none

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # 检测脚本只用 node 内置 + 全局 fetch,无需 pnpm install。
      - name: Check regulation drift
        id: check
        working-directory: core
        run: |
          set +e
          node packages/client/scripts/reg-check.mjs --report "$RUNNER_TEMP/reg-drift-report.md"
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Fail on detector error
        if: steps.check.outputs.code == '1' || steps.check.outputs.code == '2'
        run: |
          echo "::error::reg:check failed (exit ${{ steps.check.outputs.code }}) — 检测器或基线坏了"
          exit 1

      # ---- 漂移(exit 3):重建逐字全文镜像数据,并开/更新一个同步 PR ----
      # reg-check --write 重设快照基线,build-reg-clauses 重建 reg-clauses/*.json + _full.json。
      # 二者都零依赖(node 内置 + fetch),CI 直接 node 跑,无需 pnpm install。
      - name: Regenerate verbatim regulation text
        if: steps.check.outputs.code == '3'
        working-directory: core
        run: |
          node packages/client/scripts/reg-check.mjs --write
          node packages/client/scripts/build-reg-clauses.mjs

      - name: Open / update verbatim-sync PR
        if: steps.check.outputs.code == '3'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: regulation-sync
          base: main
          title: 'chore(regulation): 同步规则全文镜像到 WCA 最新官方版本'
          body-path: ${{ runner.temp }}/reg-drift-report.md
          commit-message: 'chore(regulation): sync verbatim regulation text to latest official version'
          labels: regulation-drift
          delete-branch: true

      # 图文转述版章节(/regulation/<slug>)需人工重写 → 仍开/更新 issue 跟踪(用 update-regulation skill)。
      - name: Open / update drift issue (illustrated chapters need a human rewrite)
        if: steps.check.outputs.code == '3'
        working-directory: core
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create regulation-drift --color B60205 --description "WCA 规则官方源出现变化" --force || true
          existing=$(gh issue list --label regulation-drift --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file "$RUNNER_TEMP/reg-drift-report.md"
            echo "commented drift report on #$existing"
          else
            gh issue create \
              --label regulation-drift \
              --assignee "${{ github.repository_owner }}" \
              --title "WCA 规则更新检测 ($(date -u +%Y-%m-%d))" \
              --body-file "$RUNNER_TEMP/reg-drift-report.md"
          fi
