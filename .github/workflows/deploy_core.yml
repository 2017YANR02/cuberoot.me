# 后端部署（云服务器 Hono API）
# 仅当 core/ 源码有变更时触发
# 构建 server bundle → rsync 到 云服务器 → apply_migrations + pm2 reload
name: Deploy Core

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - '!_assets/**'
      - '.github/workflows/deploy_core.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 只取 core/(server bundle + migrations + cube555 daemon glue),跳过仓库根 ~1GB 静态残留(blob:none partial clone)。
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            core
          filter: blob:none

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: core/pnpm-lock.yaml

      # 安装依赖
      - name: Install dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      # @cuberoot/shared + @cuberoot/visualcube 必须在 server bundle 之前 build:
      # server.bundle.js (esbuild --bundle) 走 @cuberoot/shared subpath + visualcube 的 node→dist/*.js 条件,
      # 需要 dist/ 已存在。
      - name: Build shared deps
        working-directory: core
        run: |
          pnpm --filter @cuberoot/shared build
          pnpm --filter @cuberoot/visualcube build

      # esbuild --bundle 把 server src + 全部 deps (含写得烂的 sr-puzzlegen,
      # 无扩展名 ESM)打成单个 dist/server.bundle.js,Node 严格模式直接跑。
      # 旧的 tsc -b + `pnpm deploy --prod --legacy` self-contained 树已退役。
      - name: Build server bundle
        working-directory: core
        run: pnpm --filter @cuberoot/server build:bundle

      # ── 后端部署到 云服务器 ──

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy server
        run: |
          # bundle 自包含 → 只需要 scp 单文件 + sourcemap + migrations。
          # 旧 node_modules 树已退役;留在远端无害但下次清理可以删
          # (`ssh root@cuberoot 'rm -rf /root/core-api/node_modules'`)。

          # 先确保远端目录存在
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "root@${{ secrets.DEPLOY_HOST }}" \
            'mkdir -p /root/core-api/dist'

          # server.bundle.js + sourcemap
          rsync -ltz --chmod=F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            core/packages/server/dist/server.bundle.js \
            core/packages/server/dist/server.bundle.js.map \
            "root@${{ secrets.DEPLOY_HOST }}:/root/core-api/dist/"

          # migrations/ — schema 改动放这里,apply_migrations.sh 自动跑没跑过的
          # 必须在 pm2 restart 之前!否则新代码部上去查不到列 → /api/* 全 500
          rsync -rltz --delete --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            core/packages/server/migrations/ "root@${{ secrets.DEPLOY_HOST }}:/root/core-api/migrations/"

          # cube555-daemon/Daemon.java — Java 子进程的胶水代码,跟 server.bundle.js
          # 同步更新,然后 javac 重编;pm2 reload 自然让 Hono 再 spawn,新 .class 接上。
          # 上游 cube555 src + lib/twophase.jar 已一次性铺在 /opt/cube555/(见 core/cube555-daemon/README.md)。
          rsync -ltz --chmod=F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            core/cube555-daemon/Daemon.java \
            "root@${{ secrets.DEPLOY_HOST }}:/opt/cube555/example/Daemon.java"
          ssh -T -n -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "root@${{ secrets.DEPLOY_HOST }}" \
            'cd /opt/cube555 && javac -d dist -cp "dist:lib/twophase.jar" example/Daemon.java'

          ssh -T -n -o ServerAliveInterval=30 -o ServerAliveCountMax=3 \
            -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "root@${{ secrets.DEPLOY_HOST }}" \
            '/usr/local/bin/apply_migrations.sh /root/core-api/migrations'

          # pm2 reload — 给老 worker drain 时间再杀,比 restart 平滑;首次部署
          # 走 fallback 直接 start。entry 现在固定 dist/server.bundle.js,不再
          # 需要 delete + start 这种粗暴换 entry 的写法。
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "root@${{ secrets.DEPLOY_HOST }}" \
            'cd /root/core-api && (pm2 reload core-api --update-env 2>/dev/null || pm2 start dist/server.bundle.js --name core-api --node-args="--env-file=.env") && pm2 save'

          # nginx api_cache 24h TTL,server schema/SQL 一改老响应顽固活着 → 部署后清空
          # (memory: reference_nginx_proxy_cache.md)
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "root@${{ secrets.DEPLOY_HOST }}" \
            'rm -rf /var/cache/nginx/api/* && nginx -s reload'
