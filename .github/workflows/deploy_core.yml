# 前端部署（GitHub Pages）+ 后端部署（云服务器 Hono API）
# 仅当 core/ 源码有变更时触发
# 前端：构建 Vite 产物 → 提交到根目录 → GitHub Pages + deploy_mirror 自动 serve
# 后端：构建 server dist → rsync 到 云服务器 → pm2 restart
name: Deploy Core

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - '!_assets/**'
      - '.github/workflows/deploy_core.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: core/pnpm-lock.yaml

      # 安装依赖
      - name: Install dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      # 构建前端
      - name: Build client
        working-directory: core
        run: pnpm --filter @cuberoot/client build

      # 先 bundle visualcube (esbuild 单文件输出，server Node ESM 才能 import)
      # tsc -b 只跑 tsconfig 不跑 npm script，必须显式调用
      - name: Build visualcube
        working-directory: core
        run: pnpm --filter @cuberoot/visualcube build

      # 构建后端 + 打 self-contained deploy bundle (含 prod node_modules,workspace 内联)
      - name: Build server
        working-directory: core
        run: pnpm --filter @cuberoot/server build

      - name: Bundle server deploy
        working-directory: core
        run: |
          rm -rf /tmp/server-deploy
          pnpm --filter @cuberoot/server deploy --prod --legacy /tmp/server-deploy

      # 将 client dist 产物同步到仓库根目录
      # NOTE: Vite 产出 index.html + _assets/ + public/ 静态文件
      # 不能 rm -rf 根目录，只清理 Vite 管理的文件
      - name: Sync dist to root
        run: |
          # 清理旧的 Vite chunks（_assets/ 由 Vite assetsDir 配置）
          rm -rf _assets
          # 清理旧的 app/ 目录（迁移过渡期）
          rm -rf app
          # 复制 Vite 产物到根目录（merge，不覆盖 tools/ stats/ 等）
          cp -r core/packages/client/dist/* .
          # NOTE: GitHub Pages SPA fallback — 404.html = index.html 副本
          # GitHub Pages 对未知路径返回 404.html，SPA 直接加载无需跳转
          cp index.html 404.html

      # 提交并推送（deploy_mirror.yml 会自动同步到国内镜像）
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A _assets/ index.html 404.html favicon.svg CubeRoot-dark.png sw.js
          git add -A vendor/ fonts/ ffmpeg/ icons/ textures/ donate/ analyze-worker/
          git add -A scramble_module.js icons.svg icon_timer.png cstimer_logo.png
          git add -A MediaInfoModule.wasm manifest.json countries-110m.geojson cn_disputed_patches.geojson beian-badge.png
          # 清理已删除的 app/ 目录（首次迁移后不存在则忽略）
          git add -A app/ 2>/dev/null || true
          # 仅在有变化时才提交
          git diff --cached --quiet || git commit -m "ci: rebuild SPA from core/"
          # NOTE: race-safe push — main 可能被 README/手动 commit 等 in-flight push 挤走，
          # 失败就 fetch + rebase + 重试，最多 5 次。
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            if git push origin main; then
              echo "push succeeded on attempt $attempt"
              break
            fi
            echo "push attempt $attempt rejected, retrying..."
            sleep $((attempt * 3))
          done

      # ── 后端部署到 云服务器 ──

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy server
        run: |
          # NOTE: 不在根用 --delete（避免删 云服务器 上的 .env / pm2 状态等）
          # 各子目录单独 --delete 保证清理旧内容

          # dist (compiled JS)
          rsync -rltz --delete --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            /tmp/server-deploy/dist/ "root@${{ secrets.DEPLOY_HOST }}:/root/core-api/dist/"

          # node_modules (prod deps + workspace 内联)
          rsync -rltz --delete --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            /tmp/server-deploy/node_modules/ "root@${{ secrets.DEPLOY_HOST }}:/root/core-api/node_modules/"

          # package.json
          rsync -ltz --chmod=F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            /tmp/server-deploy/package.json "root@${{ secrets.DEPLOY_HOST }}:/root/core-api/package.json"

          # pm2 重启（首次用 start，已有则 restart）
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "root@${{ secrets.DEPLOY_HOST }}" \
            'cd /root/core-api && (pm2 restart core-api 2>/dev/null || pm2 start dist/index.js --name core-api --node-args="--env-file=.env") && pm2 save'
