# 前端部署（GitHub Pages）+ 后端部署（ECS Hono API）
# 仅当 core/ 源码有变更时触发
# 前端：构建 Vite 产物 → 提交到根目录 → GitHub Pages + deploy_mirror 自动 serve
# 后端：构建 server dist → rsync 到 ECS → pm2 restart
name: Deploy Core

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - '!_assets/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: core/pnpm-lock.yaml

      # 安装依赖
      - name: Install dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      # 构建前端
      - name: Build client
        working-directory: core
        run: pnpm --filter @cuberoot/client build

      # 构建后端
      - name: Build server
        working-directory: core
        run: pnpm --filter @cuberoot/server build

      # 将 client dist 产物同步到仓库根目录
      # NOTE: Vite 产出 index.html + _assets/ + public/ 静态文件
      # 不能 rm -rf 根目录，只清理 Vite 管理的文件
      - name: Sync dist to root
        run: |
          # 清理旧的 Vite chunks（_assets/ 由 Vite assetsDir 配置）
          rm -rf _assets
          # 清理旧的 app/ 目录（迁移过渡期）
          rm -rf app
          # 复制 Vite 产物到根目录（merge，不覆盖 tools/ stats/ 等）
          cp -r core/packages/client/dist/* .
          # NOTE: GitHub Pages SPA fallback — 404.html = index.html 副本
          # GitHub Pages 对未知路径返回 404.html，SPA 直接加载无需跳转
          cp index.html 404.html

      # 提交并推送（deploy_mirror.yml 会自动同步到国内镜像）
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A _assets/ index.html 404.html favicon.svg CubeRoot-dark.png
          git add -A oll_pic/ zbll_svg/ zbls_img/ vendor/ fonts/
          git add -A scramble_module.js confetti.min.js icons.svg icon_timer.png cstimer_logo.png
          # 清理已删除的 app/ 目录（首次迁移后不存在则忽略）
          git add -A app/ 2>/dev/null || true
          # 仅在有变化时才提交
          git diff --cached --quiet || git commit -m "ci: rebuild SPA from core/"
          git pull --rebase origin main
          git push

      # ── 后端部署到 ECS ──

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy server to ECS
        run: |
          # rsync server dist 到 ECS
          rsync -rltz --delete --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            core/packages/server/dist/ "root@${{ secrets.DEPLOY_HOST }}:/root/core-api/dist/"

          # pm2 重启（首次用 start，已有则 restart）
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "root@${{ secrets.DEPLOY_HOST }}" \
            'cd /root/core-api && (pm2 restart core-api 2>/dev/null || pm2 start dist/index.js --name core-api --node-args="--env-file=.env") && pm2 save'
