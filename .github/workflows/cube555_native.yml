name: cube555 native-image

# GraalVM AOT build of cs.cube555.Daemon → standalone Linux binary on server.
# Only fires when Daemon.java / native-image meta changes, or manually.
#
# Smoke test runs on the SERVER (not CI runner) since the 230MB pruning tables
# already live there — cold-building them in CI from scratch would burn 5+ min
# per run and the tables get thrown away anyway. CI just produces the binary,
# scps it to a staging path, server runs `echo smoke1 | ./binary` and only
# promotes to /opt/cube555/cube555-daemon if it produces READY + OK.

on:
  workflow_dispatch:
  push:
    paths:
      - 'core/cube555-daemon/Daemon.java'
      - 'core/cube555-daemon/native-image/**'
      - '.github/workflows/cube555_native.yml'

concurrency:
  group: cube555-native
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Install musl toolchain + static zlib
        # ubuntu-latest 用 glibc 2.39, 服务器更旧 → 动态链接产物在服务器 ld 报
        # GLIBC_2.34 not found。改 --static --libc=musl 做完全静态二进制,不依
        # 赖系统 libc, 在任何 Linux x64 上都能跑。GraalVM 文档:
        # https://www.graalvm.org/latest/reference-manual/native-image/guides/build-static-and-mostly-static-executable/
        #
        # native-image 的 libzip.a 会链接 -lz; ubuntu zlib1g-dev 是 glibc 编的
        # 不能用,得自己用 musl-gcc 编一份 static libz 装到 /usr/local/lib。
        run: |
          # runner 镜像里 sources.list.d/azure-cli.list、mssql-release.list 签名过期,
          # 全量 apt-get update 报错(exit 100)。只删这两个,别限制 sourcelist 到主
          # 文件——24.04 镜像自己的 main/universe/restricted/multiverse 定义在
          # sources.list.d/ubuntu.sources(deb822),限制会连它也跳过、update 静默
          # 不生效,install 时 "Unable to locate package"。
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
          ZLIB_VER=1.3.1
          curl -fsSLO "https://github.com/madler/zlib/releases/download/v${ZLIB_VER}/zlib-${ZLIB_VER}.tar.gz"
          file zlib-${ZLIB_VER}.tar.gz
          tar xzf zlib-${ZLIB_VER}.tar.gz
          cd zlib-${ZLIB_VER}
          CC=musl-gcc ./configure --prefix=/usr/local --static
          make -j"$(nproc)"
          sudo make install
          # native-image 调 musl-gcc linker 走自己的 -L 列表 (不读 LIBRARY_PATH),
          # /usr/local/lib 不在列表里。直接 copy 到 /usr/lib/x86_64-linux-musl/
          # (该路径在 musl-gcc.specs 默认搜索里)。
          sudo cp /usr/local/lib/libz.a /usr/lib/x86_64-linux-musl/libz.a
          ls -la /usr/lib/x86_64-linux-musl/libz.a

      - name: Clone cube555 upstream
        run: git clone --depth=1 https://github.com/cs0x7f/cube555.git /tmp/cube555

      - name: Inject Daemon.java + native-image meta
        run: |
          cp core/cube555-daemon/Daemon.java /tmp/cube555/example/Daemon.java
          mkdir -p /tmp/cube555/native-image
          cp -r core/cube555-daemon/native-image/. /tmp/cube555/native-image/
          ls -la /tmp/cube555/native-image

      - name: Compile sources
        working-directory: /tmp/cube555
        run: |
          mkdir -p dist
          # cube555 source declares package cs.cube555; example/Daemon.java in
          # same package, depends on lib/twophase.jar (cs.min2phase).
          javac -d dist -cp lib/twophase.jar src/*.java example/Daemon.java
          ls dist/cs/cube555 | head

      - name: Build native-image
        working-directory: /tmp/cube555
        run: |
          native-image \
            --static \
            --libc=musl \
            --no-fallback \
            -O2 \
            -H:Name=cube555-daemon \
            -H:SerializationConfigurationFiles=native-image/serialization-config.json \
            -H:ReflectionConfigurationFiles=native-image/reflect-config.json \
            -H:ResourceConfigurationFiles=native-image/resource-config.json \
            -cp dist:lib/twophase.jar \
            cs.cube555.Daemon
          ls -lh cube555-daemon
          file cube555-daemon
          # Verify it's actually static (no dynamic linker section)
          ldd cube555-daemon 2>&1 || true

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install rsync
        # runner 镜像里 sources.list.d/azure-cli.list、mssql-release.list 签名过期,
        # 全量 apt-get update 报错(exit 100)拖垮 && 链;只删这两个,别限制 sourcelist
        # 到主文件——24.04 镜像自己的 main/universe/restricted/multiverse 定义在
        # sources.list.d/ubuntu.sources(deb822),限制会连它也跳过、update 静默不生效。
        # 优先复用镜像自带 rsync 绕开网络请求。
        run: |
          if ! command -v rsync >/dev/null 2>&1; then
            sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/mssql-release.list
            sudo apt-get update
            sudo apt-get install -y rsync
          fi

      - name: Upload binary to staging path
        run: |
          rsync -ltz --chmod=F755 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            /tmp/cube555/cube555-daemon \
            "root@${{ secrets.DEPLOY_HOST }}:/opt/cube555/cube555-daemon.new"

      - name: Stop core-api for smoke
        # 服务器 1.8GB RAM, 已被 Hono+JVM daemon 占 ~1.2GB,smoke 跑 native binary
        # (加载 230MB 剪枝表)会跟 JVM daemon 撞内存触发 OOM killer。先 pm2 stop
        # 让 Hono 退场 (期间 /v1/* 短暂 503),smoke 完再启回来。
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "root@${{ secrets.DEPLOY_HOST }}" \
            'pm2 stop core-api || true; sleep 2; free -m | head -2'

      - name: Smoke test on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "root@${{ secrets.DEPLOY_HOST }}" \
            'cd /opt/cube555 && CUBE555_WORKERS=1 timeout 60 bash -c "printf '\''smoke1\nQUIT\n'\'' | ./cube555-daemon.new -Xmx512m" > /tmp/cube555.out 2> /tmp/cube555.err; rc=$?; tail -30 /tmp/cube555.err; echo "---stdout---"; cat /tmp/cube555.out; if grep -q "^READY" /tmp/cube555.out && grep -q "smoke1.*OK" /tmp/cube555.out; then echo "✓ smoke ok"; else echo "✗ smoke failed (rc=$rc)"; exit 1; fi'

      - name: Promote binary + restart core-api
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "root@${{ secrets.DEPLOY_HOST }}" \
            'mv /opt/cube555/cube555-daemon.new /opt/cube555/cube555-daemon && (pm2 restart core-api --update-env || pm2 start core-api)'

      - name: Always restore core-api on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "root@${{ secrets.DEPLOY_HOST }}" \
            'rm -f /opt/cube555/cube555-daemon.new; (pm2 restart core-api || pm2 start core-api) || true'
