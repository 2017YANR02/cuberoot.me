# 历史排名 snapshot:每天下载 WCA dump,在 CI 算 (event,year) 累积最佳 + 三层 rank,
# 灌进服务器 PG 的 historical_ranks_snapshot 表.
# 失败:服务器旧数据继续服;成功:原子 swap 替换.
name: Update Historical Ranks

on:
  schedule:
    # 每周五 18:00 UTC = Fri 11:00 AM PDT (夏令时 3-11 月)
    # 冬令时 (PST, 11-3 月) 这个时间会变成 10:00 AM 早一小时,GH cron 不支持 TZ
    - cron: '0 18 * * 5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      LANG: en_US.UTF-8
    steps:
      # NOTE: 删除 runner 上不需要的预装软件,腾出 ~10GB 磁盘——MySQL 临时文件需要
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: actions/checkout@v4

      - name: Activate MySQL
        run: sudo systemctl start mysql.service

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install stats-build dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      # NOTE: 复用 stats.yml 的 MySQL 配置(root/root)
      - name: Setup database config
        run: |
          printf 'database: "wca_statistics"\nusername: "root"\npassword: "root"\nhost: "127.0.0.1"' > core/packages/stats-build/database.yml

      - name: Download and import WCA database
        working-directory: core/packages/stats-build
        run: npx tsx src/bin/update_database.ts

      - name: Build historical ranks snapshot
        working-directory: core/packages/stats-build
        env:
          NODE_OPTIONS: '--expose-gc --max-old-space-size=12288'
        run: npx tsx src/bin/historical_ranks_build.ts

      - name: Verify output
        working-directory: core/packages/stats-build
        run: |
          ls -lh output/historical_ranks/
          echo "snapshot rows: $(wc -l < output/historical_ranks/historical_ranks_snapshot.copy.tsv)"
          echo "persons rows: $(wc -l < output/historical_ranks/wca_persons.copy.tsv)"

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id
          chmod 600 ~/.ssh/id
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload TSVs to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        working-directory: core/packages/stats-build/output/historical_ranks
        run: |
          ssh -i ~/.ssh/id "$DEPLOY_USER@$DEPLOY_HOST" 'mkdir -p /tmp/wca_import && rm -rf /tmp/wca_import/*'
          scp -i ~/.ssh/id load.sql wca_continents.copy.tsv wca_countries.copy.tsv wca_persons.copy.tsv historical_ranks_snapshot.copy.tsv \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/wca_import/"

      - name: Apply on server (atomic swap in PG)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/id "$DEPLOY_USER@$DEPLOY_HOST" '/usr/local/bin/historical_ranks_apply.sh'
