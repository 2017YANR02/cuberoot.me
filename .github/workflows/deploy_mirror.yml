# 每次 push 或其他 CI 完成后，直接 rsync 仓库静态文件到云（镜像）
# 目标：www.cuberoot.me（与 GH Pages 镜像保持一致）
name: Deploy Mirror to cuberoot

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Update Stats", "Update Upcoming Comps", "Deploy Core"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # NOTE: workflow_run 时只在上游成功时才部署，避免把错误内容同步到镜像
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      # 组装部署目录（替代 Jekyll build）
      - name: Assemble deploy directory
        run: |
          mkdir -p _deploy

          # 1. SPA 产物（deploy_core 已提交到根目录）
          cp -f index.html _deploy/
          [ -f 404.html ] && cp -f 404.html _deploy/ || true
          [ -d _assets ] && cp -r _assets _deploy/ || true

          # 2. 独立 HTML/JS 工具模块（iframe 嵌入，原封不动）
          [ -d tools ] && cp -r tools _deploy/ || true

          # 3. Stats 数据（JSON + md 保留）
          [ -d stats ] && cp -r stats _deploy/ || true

          # 4. 静态资源目录
          for d in icons fonts vendor data ffmpeg textures donate analyze-worker images; do
            [ -d "$d" ] && cp -r "$d" _deploy/ || true
          done

          # 5. 根目录散落的静态文件
          # NOTE: beian-badge.png — cuberoot.me 域名下显示中国 ICP/公安备案小图标
          # NOTE: bf2b302...txt — WeChat 域名审核 verification token,删除会导致解封状态丢失
          for f in favicon.svg CubeRoot-dark.png manifest.json \
                   scramble_module.js icons.svg \
                   icon_timer.png cstimer_logo.png callback.html \
                   robots.txt sitemap.xml MediaInfoModule.wasm \
                   countries-110m.geojson cn_disputed_patches.geojson \
                   beian-badge.png sw.js blog-slugs.json \
                   bf2b302cee273ba35e5f50c3dffffdd0.txt; do
            [ -f "$f" ] && cp -f "$f" _deploy/ || true
          done

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PATH_REMOTE: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # --exclude='.*' 滤掉 git checkout 的 atomic-write 临时文件 (`.<name>.<rand>`)
          # 否则 rsync 扫到 tmp 后传输前 tmp 被 rename/删 → exit 24
          rsync -rltz --delete --exclude='blog' --exclude='.*' --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            _deploy/ "${USER}@${HOST}:${PATH_REMOTE}/"

      # nemesizer 数据集驻 Node heap, .bin.gz 替换后必须 pm2 reload 才能拿新数据。
      # 只在 stats 周更触发时跑 — 其它 trigger(push/upcoming-comps/deploy-core)
      # 数据没变,reload 是浪费(虽然无害)。
      - name: Reload core-api to pick up new nemesizer dataset
        if: github.event_name == 'workflow_run' && github.event.workflow_run.name == 'Update Stats'
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -T -n -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${USER}@${HOST}" 'pm2 reload core-api'
