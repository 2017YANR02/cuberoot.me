# 每次 push 或其他 CI 完成后，自动构建 Jekyll 并 rsync 到阿里云（国内镜像）
# 目标：www.cuberoot.me
name: Deploy Mirror to China

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Update Stats", "Update Upcoming Comps", "Deploy Core"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # NOTE: workflow_run 时只在上游成功时才部署，避免把错误内容同步到镜像
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PATH_REMOTE: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -rltz --delete --exclude='.user.ini' --exclude='legacy/recon/api/data/' --exclude='legacy/recon/api/db_config.php' --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            _site/ "${USER}@${HOST}:${PATH_REMOTE}/"
