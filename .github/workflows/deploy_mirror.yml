# 每次 push 或其他 CI 完成后，直接 rsync 仓库静态文件到阿里云（国内镜像）
# 目标：www.cuberoot.me（与 ruiminyan.github.io 内容保持一致）
name: Deploy Mirror to China

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Update Stats", "Update Upcoming Comps", "Deploy Core"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # NOTE: workflow_run 时只在上游成功时才部署，避免把错误内容同步到镜像
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      # 组装部署目录（替代 Jekyll build）
      - name: Assemble deploy directory
        run: |
          mkdir -p _deploy

          # 1. SPA 产物（deploy_core 已提交到根目录）
          cp -f index.html _deploy/
          [ -f 404.html ] && cp -f 404.html _deploy/ || true
          [ -d _assets ] && cp -r _assets _deploy/ || true

          # 2. 独立 HTML/JS 工具模块（iframe 嵌入，原封不动）
          [ -d tools ] && cp -r tools _deploy/ || true

          # 3. Stats 数据（JSON + md 保留）
          [ -d stats ] && cp -r stats _deploy/ || true

          # 4. 静态资源目录
          for d in icons fonts oll_pic zbll_svg zbls_img vendor data; do
            [ -d "$d" ] && cp -r "$d" _deploy/ || true
          done

          # 5. 根目录散落的静态文件
          for f in favicon.svg CubeRoot-dark.png manifest.json \
                   scramble_module.js confetti.min.js icons.svg \
                   icon_timer.png cstimer_logo.png callback.html \
                   robots.txt sitemap.xml; do
            [ -f "$f" ] && cp -f "$f" _deploy/ || true
          done

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PATH_REMOTE: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -rltz --delete --exclude='.user.ini' --exclude='blog' --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            _deploy/ "${USER}@${HOST}:${PATH_REMOTE}/"
