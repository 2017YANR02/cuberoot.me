# 前端测试 — vitest 单元 + 算法回归
# 触发：PR 打开/更新,或推 main 时 core/ 有改动
name: Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'core/**'
      - '.github/workflows/test.yml'
  push:
    branches: [main]
    paths:
      - 'core/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 只需 core/(根有 stats/ 709MB + tools/ 等 ~1GB 静态残留);blob:none partial clone 跳过下载.
      # 例外:tools/cstimer-scramble(519K)是非 WCA 求解器测试的打乱 oracle,必须拉进来,
      # 否则 bic/cm3/heli/helicv/ctico/sia222 的 "≥200 real cstimer scrambles" 全 0 条变红.
      # 例外:.claude/hooks(项目级 PreToolUse 钩子)—— code-guards-drift.test.ts 断言
      # block-raw-checkbox.ps1 / block-handwritten-trad.ps1 在仓库根存在,不拉进来会误判缺失.
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            tools/cstimer-scramble
            .claude/hooks
          filter: blob:none

      - uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: core/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      # client typecheck 走 tsgo --noEmit,不像旧 tsc -b 会自建 project references,
      # 它 import @cuberoot/shared + visualcube 的产物;server tsconfig references 这两个,
      # tsc 启动校验它们的 dist/.d.ts 必须存在(TS6305)。所以先 build 再 typecheck。
      # skewb-notation 测试也走 shared 的 node 导出(dist),同样要先 build。
      - name: Build shared deps
        working-directory: core
        run: |
          pnpm --filter @cuberoot/shared build
          pnpm --filter @cuberoot/visualcube build

      - name: Typecheck client
        working-directory: core
        run: pnpm --filter @cuberoot/client typecheck

      # esbuild bundle 只剥类型不检查,server 类型坏了 deploy_core build 仍能过
      # → 必须 CI 真跑 tsc --noEmit 兜底。
      - name: Typecheck server
        working-directory: core
        run: pnpm --filter @cuberoot/server typecheck

      - name: Test
        working-directory: core
        run: pnpm --filter @cuberoot/client test

      # 死代码棘轮:只卡已清零的类别(unused files / deps / unlisted / binaries),
      # 不卡 unused exports/types(649/221,过度导出噪声,另行收敛)。配置见 core/knip.json。
      - name: Knip dead-code guard
        working-directory: core
        run: pnpm exec knip --include files,dependencies,unlisted,binaries --no-config-hints
