# 前端测试 — vitest 单元 + 算法回归
# 触发：PR 打开/更新,或推 main 时 core/ 有改动
name: Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'core/**'
      - '.github/workflows/test.yml'
  push:
    branches: [main]
    paths:
      - 'core/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: core/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      - name: Typecheck client
        working-directory: core
        run: pnpm --filter @cuberoot/client typecheck:ci

      # esbuild bundle 只剥类型不检查,server 类型坏了 deploy_core build 仍能过
      # → 必须 CI 真跑 tsc --noEmit 兜底。
      # server tsconfig references shared + visualcube,tsc 启动校验它们 dist/.d.ts
      # 必须存在(TS6305),所以先 build 这两个再 typecheck server。
      - name: Build shared deps
        working-directory: core
        run: |
          pnpm --filter @cuberoot/shared build
          pnpm --filter @cuberoot/visualcube build

      - name: Typecheck server
        working-directory: core
        run: pnpm --filter @cuberoot/server typecheck

      - name: Test
        working-directory: core
        run: pnpm --filter @cuberoot/client test
