# 编译 cuberoot.me SPA 套壳 iOS .ipa + Android .apk
# 给自己 iPhone / Android 侧载用,不上架 store
#
# 触发:
#   1. workflow_dispatch — Actions tab 手按
#   2. push 到 mobile-build 分支 — 用于 iterate
#
# 产物:
#   cuberoot-android-apk  →  app-debug.apk           (ubuntu-latest, ~5 min)
#   cuberoot-ios-ipa      →  cuberoot-unsigned.ipa   (macos-latest, ~15 min, 10x 单价)
#
# 安装:
#   Android: 传 APK 到手机,允许"未知来源",点 APK 安装
#   iOS:     Sideloadly + 免费 Apple ID 自签到 iPhone, 7 天有效
name: Build Mobile Apps

on:
  workflow_dispatch:
    inputs:
      run_smoke:
        description: 'iOS Simulator smoke test (装 app + 截多张图)'
        type: boolean
        default: false
  push:
    branches: [main, mobile-build]
    paths:
      # 只在 SPA 代码 / shared 包 / capacitor 配置 / workflow 改时跑。
      # 避免每个 stats/blog/docs commit 都触发 build。
      - 'core/packages/client/**'
      - 'core/packages/shared/**'
      - 'core/packages/visualcube/**'
      - '.github/workflows/mobile_build.yml'

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: core/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Install dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      - name: Build shared workspace deps
        working-directory: core
        run: |
          pnpm --filter @cuberoot/shared build
          pnpm --filter @cuberoot/visualcube build

      - name: Build SPA
        working-directory: core
        run: pnpm --filter @cuberoot/client build

      - name: Capacitor sync Android
        working-directory: core/packages/client
        run: pnpm exec cap sync android

      - name: Build APK
        working-directory: core/packages/client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: cuberoot-android-apk
          path: core/packages/client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error

  ios:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: core/pnpm-lock.yaml

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      - name: Build shared workspace deps
        working-directory: core
        run: |
          pnpm --filter @cuberoot/shared build
          pnpm --filter @cuberoot/visualcube build

      - name: Build SPA
        working-directory: core
        run: pnpm --filter @cuberoot/client build

      - name: Capacitor sync iOS
        working-directory: core/packages/client
        run: pnpm exec cap sync ios

      - name: Resolve SPM packages
        working-directory: core/packages/client/ios/App
        run: |
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Build unsigned archive
        working-directory: core/packages/client/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/App.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Package unsigned IPA
        working-directory: core/packages/client/ios/App
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build
          zip -qr cuberoot-unsigned.ipa Payload
          ls -lh cuberoot-unsigned.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: cuberoot-ios-ipa
          path: core/packages/client/ios/App/build/cuberoot-unsigned.ipa
          retention-days: 14
          if-no-files-found: error

      # ─── iOS Simulator smoke test (opt-in) ───
      # 默认关。手动 `gh workflow run mobile_build.yml -f run_smoke=true` 才跑。
      # 用 simctl openurl 把命令喂进 app (见 utils/capacitor_test_commands.ts) —
      # navigate/scroll/theme 三个动作, 每个截一张图, 让 AI 不用 Mac/iPhone 也能验
      # iOS webview 渲染。失败不阻塞 IPA 上传 (continue-on-error)。

      - name: Build for simulator
        if: github.event_name == 'workflow_dispatch' && inputs.run_smoke == true
        working-directory: core/packages/client/ios/App
        continue-on-error: true
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/SimDD \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Boot iPhone 16 simulator
        if: github.event_name == 'workflow_dispatch' && inputs.run_smoke == true
        continue-on-error: true
        run: |
          xcrun simctl boot "iPhone 16" || true
          xcrun simctl bootstatus "iPhone 16" -b

      - name: Install + launch app
        if: github.event_name == 'workflow_dispatch' && inputs.run_smoke == true
        working-directory: core/packages/client/ios/App
        continue-on-error: true
        run: |
          APP=$(find build/SimDD/Build/Products/Debug-iphonesimulator -maxdepth 1 -name "*.app" | head -1)
          echo "APP=$APP"
          xcrun simctl install booted "$APP"
          xcrun simctl launch booted me.cuberoot.app
          # 等 React + LandingPage + RecentRecords API 加载完
          sleep 8

      - name: Smoke screenshots (LandingPage / scroll / navigate / theme)
        if: github.event_name == 'workflow_dispatch' && inputs.run_smoke == true
        working-directory: core/packages/client/ios/App
        continue-on-error: true
        run: |
          mkdir -p smoke
          # 0. 主页顶部 (默认 light 主题)
          xcrun simctl io booted screenshot smoke/01-landing-top.png

          # 1. 滚到 TOOL 区 (CSS id = section-tool)
          xcrun simctl openurl booted "me.cuberoot.app://test?cmd=scroll:%23section-tool"
          sleep 1
          xcrun simctl io booted screenshot smoke/02-landing-tool.png

          # 2. 跳 /recon (CORS + CapacitorHttp 验证)
          xcrun simctl openurl booted "me.cuberoot.app://test?cmd=navigate:/recon"
          sleep 4
          xcrun simctl io booted screenshot smoke/03-recon.png

          # 3. 跳 /wca (/stats/* fetch wrapper 验证)
          xcrun simctl openurl booted "me.cuberoot.app://test?cmd=navigate:/wca"
          sleep 4
          xcrun simctl io booted screenshot smoke/04-wca.png

          # 4. 切深色 (theme tokens 验证)
          xcrun simctl openurl booted "me.cuberoot.app://test?cmd=theme:dark"
          sleep 1
          xcrun simctl io booted screenshot smoke/05-wca-dark.png

          ls -la smoke/

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch' && inputs.run_smoke == true
        with:
          name: cuberoot-ios-smoke-screenshots
          path: core/packages/client/ios/App/smoke/
          retention-days: 14
          if-no-files-found: warn
