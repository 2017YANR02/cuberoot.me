# 编译 cuberoot.me SPA 套壳 iOS .ipa + Android .apk
# 给自己 iPhone / Android 侧载用,不上架 store
#
# 触发:
#   1. workflow_dispatch — Actions tab 手按
#   2. push 到 mobile-build 分支 — 用于 iterate
#
# 产物:
#   cuberoot-android-apk  →  app-debug.apk           (ubuntu-latest, ~5 min)
#   cuberoot-ios-ipa      →  cuberoot-unsigned.ipa   (macos-latest, ~15 min, 10x 单价)
#
# 安装:
#   Android: 传 APK 到手机,允许"未知来源",点 APK 安装
#   iOS:     Sideloadly + 免费 Apple ID 自签到 iPhone, 7 天有效
name: Build Mobile Apps

on:
  workflow_dispatch:
  push:
    branches: [main, mobile-build]
    paths:
      # 只在 SPA 代码 / shared 包 / capacitor 配置 / workflow 改时跑。
      # 避免每个 stats/blog/docs commit 都触发 build。
      - 'core/packages/client/**'
      - 'core/packages/shared/**'
      - 'core/packages/visualcube/**'
      - '.github/workflows/mobile_build.yml'

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: core/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Install dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      - name: Build shared workspace deps
        working-directory: core
        run: |
          pnpm --filter @cuberoot/shared build
          pnpm --filter @cuberoot/visualcube build

      - name: Build SPA
        working-directory: core
        run: pnpm --filter @cuberoot/client build

      - name: Capacitor sync Android
        working-directory: core/packages/client
        run: pnpm exec cap sync android

      - name: Build APK
        working-directory: core/packages/client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: cuberoot-android-apk
          path: core/packages/client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error

  ios:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: core/pnpm-lock.yaml

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      - name: Build shared workspace deps
        working-directory: core
        run: |
          pnpm --filter @cuberoot/shared build
          pnpm --filter @cuberoot/visualcube build

      - name: Build SPA
        working-directory: core
        run: pnpm --filter @cuberoot/client build

      - name: Capacitor sync iOS
        working-directory: core/packages/client
        run: pnpm exec cap sync ios

      - name: Resolve SPM packages
        working-directory: core/packages/client/ios/App
        run: |
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Build unsigned archive
        working-directory: core/packages/client/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/App.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Package unsigned IPA
        working-directory: core/packages/client/ios/App
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build
          zip -qr cuberoot-unsigned.ipa Payload
          ls -lh cuberoot-unsigned.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: cuberoot-ios-ipa
          path: core/packages/client/ios/App/build/cuberoot-unsigned.ipa
          retention-days: 14
          if-no-files-found: error

      # ─── iOS Simulator smoke test ───
      # 用 iOS Simulator 跑一遍 app, 截图传 artifact, 让 AI 在没 Mac/iPhone 时也能看
      # 真机 webview (WKWebView) 渲染结果。失败不阻塞 (continue-on-error), IPA 已经
      # 上传完了, smoke 只是额外信号。

      - name: Build for simulator
        working-directory: core/packages/client/ios/App
        continue-on-error: true
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/SimDD \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Boot iPhone 16 simulator
        continue-on-error: true
        run: |
          xcrun simctl boot "iPhone 16" || true
          xcrun simctl bootstatus "iPhone 16" -b

      - name: Install + launch app
        working-directory: core/packages/client/ios/App
        continue-on-error: true
        run: |
          APP=$(find build/SimDD/Build/Products/Debug-iphonesimulator -maxdepth 1 -name "*.app" | head -1)
          echo "APP=$APP"
          xcrun simctl install booted "$APP"
          xcrun simctl launch booted me.cuberoot.app
          # 等 React + LandingPage + RecentRecords API 加载完
          sleep 8

      - name: Screenshot LandingPage
        working-directory: core/packages/client/ios/App
        continue-on-error: true
        run: |
          mkdir -p smoke
          xcrun simctl io booted screenshot smoke/01-landing.png
          # 滚屏看更多卡片 (单击 home indicator 区域 + drag 模拟; xcrun 没原生 swipe,
          # 用 osascript 派 keyboard PageDown 给 simulator window — 大多数 web 页面认)
          osascript -e 'tell application "Simulator" to activate' || true
          osascript -e 'tell application "System Events" to key code 121' || true
          sleep 1
          xcrun simctl io booted screenshot smoke/02-scrolled.png
          ls -la smoke/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cuberoot-ios-smoke-screenshots
          path: core/packages/client/ios/App/smoke/
          retention-days: 14
          if-no-files-found: warn
