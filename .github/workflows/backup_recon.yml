# 每天自动备份 Recon 复盘数据到 git
# NOTE: 数据源是阿里云 PHP 后端，备份到仓库作为灾备
name: Backup Recon Data

on:
  schedule:
    # NOTE: 每天 UTC 20:00（北京时间凌晨 4:00）
    - cron: '0 20 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch recon data from API
        run: |
          mkdir -p recon/backup
          curl -s "https://toolkit.cuberoot.me/recon/api/?action=list" | python3 -m json.tool > recon/backup/recons_backup.json
          echo "Fetched $(python3 -c "import json; print(len(json.load(open('recon/backup/recons_backup.json'))))" ) recons"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recon/backup/recons_backup.json
          # NOTE: 没有变化时 git diff --cached 为空，跳过 commit
          if git diff --cached --quiet; then
            echo "No changes, skip commit"
          else
            git commit -m "backup: recon data $(date -u +%Y-%m-%d) [skip ci]"
            git pull --rebase origin main
            git push
          fi
