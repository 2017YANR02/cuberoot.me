# 部署 nginx vhost conf 到 cuberoot.me。
# 改 ops/nginx/*.conf → push → 自动 scp + nginx -t + reload。
# 失败自动回滚到 .bak。
name: Deploy Nginx Config

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ops/nginx/**'
      - '.github/workflows/deploy_nginx.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id
          chmod 600 ~/.ssh/id
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: scp confs to staging
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          for f in ops/nginx/*.conf; do
            name=$(basename "$f")
            scp -i ~/.ssh/id "$f" \
              "$DEPLOY_USER@$DEPLOY_HOST:/tmp/${name}.new"
          done

      - name: Apply + validate + reload (with rollback on failure)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/id "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<'REMOTE'
          set -e
          VHOST_DIR=/etc/nginx/vhost.d
          TS=$(date +%s)
          # Snapshot every confs that will be (re)written, so a single failure
          # rolls back the whole batch — atomic apply across all conf files.
          declare -a CHANGED=()
          declare -a BACKUPS=()

          for staging in /tmp/*.conf.new; do
            name=$(basename "$staging" .new)
            live="${VHOST_DIR}/${name}"
            if [ -f "$live" ] && cmp -s "$live" "$staging"; then
              rm -f "$staging"
              continue
            fi
            backup="${live}.bak-${TS}"
            if [ -f "$live" ]; then
              cp "$live" "$backup"
              BACKUPS+=("$backup:$live")
            else
              BACKUPS+=(":$live")   # new file — rollback = delete
            fi
            cp "$staging" "$live"
            CHANGED+=("$name")
            rm -f "$staging"
          done

          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "no-op: all confs already match"
            exit 0
          fi

          echo "applied: ${CHANGED[*]}"

          if ! nginx -t 2>&1; then
            echo "ERROR: nginx -t failed, rolling back batch"
            for entry in "${BACKUPS[@]}"; do
              backup="${entry%%:*}"
              live="${entry##*:}"
              if [ -z "$backup" ]; then
                rm -f "$live"
              else
                cp "$backup" "$live"
              fi
            done
            nginx -t 2>&1 || echo "WARN: rollback validation also failed!"
            exit 1
          fi

          nginx -s reload
          echo "OK: nginx reloaded; backups at ${VHOST_DIR}/*.bak-${TS}"
          REMOTE
