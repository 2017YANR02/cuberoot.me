# Pre-collect every WCA competition's schedule into comp_schedule_cache so the
# /v1/wca/comp/:id/schedule endpoint is an instant cache HIT for any comp — even
# the first viewer (no on-view 10MB WCIF write-through).
#
# 触发:
#   workflow_dispatch — 手动,首次全量 bootstrap 传 limit=0(~1-2h)
#   workflow_run(Update Stats 完成后)— stats.yml 重载 wca_competitions 的当下立刻暖,
#     新公示比赛首个访问者也秒出(消除 stats→backfill 的数小时空窗)
#   cron 每天 01:00 UTC — 安全网,补漏 + 刷新「未来/进行中」比赛赛程(已结束的冻结不再拉)
#
# 流程:esbuild bundle → 在 CI runner 上 fetch+trim(runner 直连 WCA 快)→ 经
# SSH 本地转发隧道把 trim 后几十 KB 的行写进 prod PG。
# 为何不在服务器上跑:prod 机器到 worldcubeassociation.org 仅 ~30KB/s,一个 10MB
# 的大赛 WCIF 会把 fetch 超时打爆 → 大赛永远 skip、缓存空。runner 直连 WCA 快,
# 只让 trim 后的小数据穿隧道回 PG(PG 只监听 127.0.0.1,隧道转发到它的 loopback)。
name: Backfill comp schedules

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'LIMIT=N 只处理前 N 场（0=全部；首次 bootstrap 传 0）'
        required: false
        default: '0'
      force:
        description: 'FORCE=1 忽略缓存全量重拉'
        required: false
        default: '0'
      dry_run:
        description: 'DRY_RUN=1 只报数量不拉取'
        required: false
        default: '0'
      concurrency:
        description: 'CONCURRENCY 并发 WCIF 拉取数（runner 直连 WCA，默认 3，单场最大 ~10MB）'
        required: false
        default: '3'
      delay_ms:
        description: 'DELAY_MS 每 worker 拉取间隔毫秒（默认 500，礼让 WCA）'
        required: false
        default: '500'
  # stats.yml 跑完即重载 wca_competitions(新公示比赛入库的时刻)→ 立刻暖缓存,
  # 堵住「stats 20:00 入库 → backfill 01:00 才暖」的 3.5~5h 空窗(新比赛首个访问者
  # 否则要等服务器慢速拉 10MB WCIF)。下方 job if 排除 push-only 的 typecheck 跑。
  workflow_run:
    workflows: ['Update Stats']
    types: [completed]
  schedule:
    # UTC 01:00 安全网 — 万一 workflow_run 没触发(stats 改名/禁用)仍每天兜底暖一次
    - cron: '0 1 * * *'

jobs:
  backfill:
    # workflow_run 仅认 schedule/dispatch 触发的成功 stats 跑(那时才重载了
    # wca_competitions);push-only 的 typecheck 跑不碰表,跳过。cron/手动 dispatch 照常跑。
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.event == 'schedule' ||
        github.event.workflow_run.event == 'workflow_dispatch'))
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 全量 bootstrap ~20k 场估 1-2h,留余地
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          # 版本单一源:core/package.json 的 packageManager(别在这里写 version,两处会打架)
          package_json_file: core/package.json

      - name: Install deps
        working-directory: core
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        working-directory: core
        run: pnpm --filter @cuberoot/shared build

      - name: Bundle backfill script
        working-directory: core
        run: |
          mkdir -p .tmp
          pnpm --filter @cuberoot/server exec esbuild scripts/backfill-schedules.ts \
            --bundle --platform=node --target=node22 --format=esm \
            --outfile=../../.tmp/backfill-schedules.js \
            --banner:js="import {createRequire} from 'module'; const require = createRequire(import.meta.url);"
          ls -la .tmp/backfill-schedules.js

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id
          chmod 600 ~/.ssh/id
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run backfill on runner (fast WCA) → prod PG over SSH tunnel
        working-directory: core
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          # cron 默认封顶 3000 场/次摊多天;手动 dispatch 传 limit=0 解封跑全量 bootstrap
          LIMIT: ${{ github.event.inputs.limit || '3000' }}
          FORCE: ${{ github.event.inputs.force || '0' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '3' }}
          DELAY_MS: ${{ github.event.inputs.delay_ms || '500' }}
        run: |
          # 守卫:所有旋钮必须是纯数字,杜绝 dispatch 输入注入进 shell
          for v in "$LIMIT" "$FORCE" "$DRY_RUN" "$CONCURRENCY" "$DELAY_MS"; do
            case "$v" in *[!0-9]*|"") echo "::error::non-numeric input: '$v'"; exit 1 ;; esac
          done
          # 只取 prod .env 里的 DB_* 凭据(不拉整份 secret 文件)
          ssh -n -i ~/.ssh/id "$DEPLOY_USER@$DEPLOY_HOST" \
            'grep -E "^DB_(HOST|PORT|USER|PASS|NAME)=" /root/core-api/.env' > db.env
          # 本地转发隧道:runner:15432 → prod 127.0.0.1:5432(PG 只听 loopback)
          ssh -fN -o ExitOnForwardFailure=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=6 \
            -i ~/.ssh/id -L 15432:127.0.0.1:5432 "$DEPLOY_USER@$DEPLOY_HOST"
          # fetch+trim 在 runner 本地跑(直连 WCA 快);DB_USER/PASS/NAME 由 node --env-file
          # 读 db.env(同 prod 解析器,密码含特殊字符也稳),DB_HOST/PORT 用真实 env 覆盖
          # 指向隧道(Node:同名时 env 优先于 --env-file)
          DB_HOST=127.0.0.1 DB_PORT=15432 \
          LIMIT=$LIMIT FORCE=$FORCE DRY_RUN=$DRY_RUN CONCURRENCY=$CONCURRENCY DELAY_MS=$DELAY_MS \
            node --env-file=db.env .tmp/backfill-schedules.js
          rm -f db.env
          # 脚本自身打印 wca_competitions=N already_cached=M to_process=K + DONE ok/empty/skip,即报告
