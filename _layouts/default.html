<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="icon" type="image/png" href="/CubeRoot.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="/CubeRoot-dark.png" media="(prefers-color-scheme: dark)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.cubing.net/v0/css/@cubing/icons/css">
    <!-- NOTE: 国旗图标 — 用于 stats 表格中国家列显示国旗 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css">
    <link rel="stylesheet" href="/assets/css/card.css">
    <link rel="stylesheet" href="/assets/css/stats_ui.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #161616;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 标题 */
        h1,
        h2,
        h3,
        h4 {
            color: #ffffff;
            margin: 1.2em 0 0.5em;
        }

        h2 {
            font-size: 1.5rem;
            /* NOTE: 覆盖 GitHub Pages Primer CSS 的默认 h2 border-bottom */
            border-bottom: none !important;
            padding-bottom: 0;
        }

        h3 {
            font-size: 1.2rem;
        }

        /* 段落和强调 */
        p {
            margin: 0.5em 0;
        }

        em {
            color: #aaa;
        }

        /* 链接 — blue-400 */
        a {
            color: #60a5fa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
            color: #93bbfc;
        }

        /* 表格 — Glassmorphism 半透明 */
        table {
            border-collapse: collapse;
            margin: 1em 0;
            font-size: 0.9rem;
        }

        th {
            background: rgba(255, 255, 255, 0.06) !important;
            color: #8892a0 !important;
            font-weight: 600;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            text-align: left;
            white-space: nowrap;
        }

        td {
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.04) !important;
            white-space: nowrap;
        }

        /* NOTE: 成绩、日期等数字列使用 Roboto Mono 等宽字体 */
        .mono-col {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.85rem;
        }

        /* 交替行 — 半透明层叠 */
        tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.03) !important;
        }

        tr:nth-child(odd) {
            background: transparent !important;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.07) !important;
        }

        /* Tab — Glassmorphism 毛玻璃 */
        .tab-btn {
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            border-radius: 4px 4px 0 0;
            transition: all 0.2s ease;
        }

        .tab-btn.active,
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        /* NOTE: Stats 索引页——卡片网格布局 */
        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 1rem;
        }

        /* NOTE: stat-card 继承 glass-card 基类，仅定义差异属性 */
        .stat-card {
            padding: 1.4rem 1.5rem;
        }

        .stat-card h3 {
            font-size: 1.05rem;
            margin: 0 0 0.8rem 0;
            color: #f1f5f9;
        }

        .stat-links {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-links a {
            display: block;
            padding: 6px 10px;
            border-radius: 6px;
            color: #cbd5e1;
            font-size: 0.9rem;
            transition: all 0.15s ease;
            text-decoration: none;
        }

        .stat-links a:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #93bbfc;
            padding-left: 16px;
            text-decoration: none;
        }

        /* NOTE: 手机端——加大触控区域满足 44px 最小要求 */
        @media (max-width: 768px) {
            .stats-dashboard {
                grid-template-columns: 1fr;
            }

            .stat-links a {
                padding: 10px;
                font-size: 0.95rem;
            }
        }
    </style>
    <!-- NOTE: 防 FOUC（Flash of Untranslated Content）——中文用户先隐藏页面，等翻译完后再显示 -->
    <script>
        if (localStorage.getItem('i18n_locale') === 'zh' ||
            (!localStorage.getItem('i18n_locale') && navigator.language && navigator.language.startsWith('zh'))) {
            document.documentElement.classList.add('i18n-loading');
            // 安全回退：如果 i18n.js 加载失败，200ms 后自动显示
            setTimeout(function () { document.documentElement.classList.remove('i18n-loading'); }, 200);
        }
    </script>
    <style>
        .i18n-loading body {
            opacity: 0;
        }

        .i18n-loading body.i18n-ready {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        {{ content }}
    </div>
    <script src="/assets/js/stats_ui.js" defer></script>
    <script src="/i18n/i18n.js" defer></script>
    <script src="/i18n/event_selector.js" defer></script>
    <script src="/assets/js/distribution_chart.js" defer></script>
    <script>
        // NOTE: 反向排除策略——排除已知纯文本列，其余自动应用 Roboto Mono 等宽字体
        document.addEventListener('DOMContentLoaded', function () {
            // 纯文本列（不需要等宽字体）
            var textHeaders = new Set([
                'Person', '选手', 'Name', '姓名', 'First name', '名', 'Last name', '姓',
                'Competition', '比赛', 'Competitions', 'Country', '国家', 'Citizen of',
                'Continent', '大洲', 'Details', '详情', 'List', 'Results',
                'Countries of origin', 'Event', '项目', 'Type', '类型',
                'List on WCA', 'WCA 页面', 'People', 'Round', '轮次',
                '1st', '2nd', '3rd', '第一名', '第二名', '第三名',
                'Region', '地区', 'Missed', 'First win', 'Times'
            ]);
            document.querySelectorAll('table').forEach(function (table) {
                var ths = table.querySelectorAll('thead th, tr:first-child th');
                if (!ths.length) return;
                var monoCols = [];
                ths.forEach(function (th, i) {
                    if (!textHeaders.has(th.textContent.trim())) monoCols.push(i);
                });
                if (!monoCols.length) return;
                table.querySelectorAll('tbody tr, tr').forEach(function (tr) {
                    var cells = tr.querySelectorAll('td');
                    monoCols.forEach(function (ci) {
                        if (cells[ci]) cells[ci].classList.add('mono-col');
                    });
                });
            });
        });
    </script>
</body>

</html>
