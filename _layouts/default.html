<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.cubing.net/v0/css/@cubing/icons/css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #0a0a0f;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 2rem;
            /* NOTE: 粒子渐变背景，与首页一致 */
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(90, 90, 200, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(200, 90, 90, 0.06) 0%, transparent 50%);
            min-height: 100vh;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        /* 标题 */
        h1,
        h2,
        h3,
        h4 {
            color: #ffffff;
            margin: 1.2em 0 0.5em;
        }

        h2 {
            font-size: 1.5rem;
            /* NOTE: 覆盖 GitHub Pages Primer CSS 的默认 h2 border-bottom */
            border-bottom: none !important;
            padding-bottom: 0;
        }

        h3 {
            font-size: 1.2rem;
        }

        /* 段落和强调 */
        p {
            margin: 0.5em 0;
        }

        em {
            color: #aaa;
        }

        /* 链接 — blue-400 */
        a {
            color: #60a5fa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
            color: #93bbfc;
        }

        /* 表格 — Glassmorphism 半透明 */
        table {
            border-collapse: collapse;
            margin: 1em 0;
            font-size: 0.9rem;
        }

        th {
            background: rgba(255, 255, 255, 0.06) !important;
            color: #8892a0 !important;
            font-weight: 600;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            text-align: left;
        }

        td {
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.04) !important;
        }

        /* 交替行 — 半透明层叠 */
        tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.03) !important;
        }

        tr:nth-child(odd) {
            background: transparent !important;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.07) !important;
        }

        /* Tab — Glassmorphism 毛玻璃 */
        .tab-btn {
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            border-radius: 4px 4px 0 0;
            transition: all 0.2s ease;
        }

        .tab-btn.active,
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="container">
        {{ content }}
    </div>
    <script src="/i18n/i18n.js" defer></script>
    <script src="/i18n/event_selector.js" defer></script>
</body>

</html>
