<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <!-- a03-frame-solve: pixel/LCD sprite frames of a 3x3 front face being SOLVED.
       6 discrete frames stacked as <g>, flipped by CSS steps(6). The 9 stickers
       visibly rearrange step by step from a scrambled mess toward a clean solved
       face (each frame swaps a few sticker colours, like applying a short alg).
       At the solved frame clawd does a "got it!" smile-eye swap + a sparkle.
       Then it re-scrambles on the loop seam (reads as shuffle -> solve again).
       Crisp retro LCD look: flat WCA-colour quads, dark gaps, no blur. -->
  <defs>
    <style>
      #ground-shadow { transform-box: view-box; transform-origin: 7.5px 15.5px;
        animation: shadow 6s infinite ease-in-out; }
      .breathe { transform-box: view-box; transform-origin: 7.5px 13px;
        animation: breathe 6s infinite ease-in-out; }
      .body-lean { transform-box: view-box; transform-origin: 7.5px 13px;
        animation: lean 6s infinite ease-in-out; }
      .arm-l { transform-box: fill-box; transform-origin: 100% 50%;
        animation: arm-l 6s infinite ease-in-out; }
      .arm-r { transform-box: fill-box; transform-origin: 0% 50%;
        animation: arm-r 6s infinite ease-in-out; }

      /* eyes: rect concentrate-squint most of the loop, smile at solve */
      .eyes-rect  { animation: rect-vis  6s infinite step-end; }
      .eyes-smile { opacity: 0; animation: smile-vis 6s infinite step-end; }
      .eyes-grp   { transform-box: view-box; transform-origin: 7.5px 9px;
        animation: eye-squint 6s infinite ease-in-out; }

      /* 6 solve frames, equal sixths, crisp toggle */
      .sf { opacity: 0; }
      #s0 { animation: s0 6s infinite steps(1); }
      #s1 { animation: s1 6s infinite steps(1); }
      #s2 { animation: s2 6s infinite steps(1); }
      #s3 { animation: s3 6s infinite steps(1); }
      #s4 { animation: s4 6s infinite steps(1); }
      #s5 { animation: s5 6s infinite steps(1); }
      @keyframes s0 { 0%,16.66% { opacity:1 } 16.67%,100% { opacity:0 } }
      @keyframes s1 { 0%,16.66% { opacity:0 } 16.67%,33.33% { opacity:1 } 33.34%,100% { opacity:0 } }
      @keyframes s2 { 0%,33.33% { opacity:0 } 33.34%,50% { opacity:1 } 50.01%,100% { opacity:0 } }
      @keyframes s3 { 0%,50% { opacity:0 } 50.01%,66.66% { opacity:1 } 66.67%,100% { opacity:0 } }
      @keyframes s4 { 0%,66.66% { opacity:0 } 66.67%,83.33% { opacity:1 } 83.34%,100% { opacity:0 } }
      @keyframes s5 { 0%,83.33% { opacity:0 } 83.34%,100% { opacity:1 } }

      /* sparkle pops at the solved frame (last sixth) */
      .spark { transform-box: fill-box; transform-origin: 50% 50%; opacity: 0;
        animation: spark 6s infinite ease-out; }

      @keyframes shadow {
        0%,100% { opacity:0.5; transform: scaleX(1); }
        50%     { opacity:0.46; transform: scaleX(0.97); }
      }
      @keyframes breathe {
        0%,100% { transform: scale(1,1) translateY(0); }
        50%     { transform: scale(1.012,0.988) translateY(0.15px); }
      }
      /* slight forward focus-lean during the solve, relax at the end */
      @keyframes lean {
        0%       { transform: translateY(0) rotate(0deg); }
        50%      { transform: translateY(0.25px) rotate(0deg); }
        83.33%   { transform: translateY(0.25px) rotate(0deg); }
        90%      { transform: translateY(-0.15px) rotate(0deg); }
        100%     { transform: translateY(0) rotate(0deg); }
      }
      /* hands jiggle as if turning the cube each step */
      @keyframes arm-l {
        0%,100% { transform: rotate(0deg) translate(0.3px,-0.3px); }
        16.66%  { transform: rotate(8deg) translate(0.5px,-0.5px); }
        33.33%  { transform: rotate(-4deg) translate(0.3px,-0.2px); }
        50%     { transform: rotate(7deg) translate(0.5px,-0.5px); }
        66.66%  { transform: rotate(-3deg) translate(0.3px,-0.2px); }
        83.33%  { transform: rotate(2deg) translate(0.35px,-0.35px); }
      }
      @keyframes arm-r {
        0%,100% { transform: rotate(0deg) translate(-0.3px,-0.3px); }
        16.66%  { transform: rotate(-3deg) translate(-0.3px,-0.2px); }
        33.33%  { transform: rotate(8deg) translate(-0.5px,-0.5px); }
        50%     { transform: rotate(-4deg) translate(-0.3px,-0.2px); }
        66.66%  { transform: rotate(7deg) translate(-0.5px,-0.5px); }
        83.33%  { transform: rotate(-2deg) translate(-0.35px,-0.35px); }
      }
      @keyframes eye-squint {
        0%      { transform: scaleY(1); }
        8%,80%  { transform: scaleY(0.82); }
        83%     { transform: scaleY(0.82); }
        100%    { transform: scaleY(1); }
      }
      @keyframes rect-vis  { 0% { opacity:1 } 83.33% { opacity:0 } 100% { opacity:0 } }
      @keyframes smile-vis { 0% { opacity:0 } 83.33% { opacity:1 } 100% { opacity:1 } }
      @keyframes spark {
        0%,80%,100% { opacity:0; transform: scale(0.4); }
        84%         { opacity:1; transform: scale(1.3); }
        88%         { opacity:1; transform: scale(1); }
        96%         { opacity:0.3; transform: scale(0.7); }
      }
    </style>
  </defs>

  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>

  <!-- legs static -->
  <g fill="#DE886D">
    <rect x="3" y="13" width="1" height="2"/>
    <rect x="5" y="13" width="1" height="2"/>
    <rect x="9" y="13" width="1" height="2"/>
    <rect x="11" y="13" width="1" height="2"/>
  </g>

  <g class="breathe">
    <g class="body-lean">
      <!-- torso -->
      <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>

      <!-- eyes: concentrate rect -> got-it smile -->
      <g class="eyes-grp">
        <g class="eyes-rect" fill="#000">
          <rect x="4" y="8" width="1" height="2"/>
          <rect x="10" y="8" width="1" height="2"/>
        </g>
        <g class="eyes-smile" fill="none" stroke="#000" stroke-width="0.7"
           stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3.5,9 4.5,8 5.5,9"/>
          <polyline points="9.5,9 10.5,8 11.5,9"/>
        </g>
      </g>

      <!-- arms -->
      <rect class="arm-l" x="0"  y="10" width="2" height="2" fill="#DE886D"/>
      <rect class="arm-r" x="13" y="10" width="2" height="2" fill="#DE886D"/>

      <!-- ===== CUBE: front 3x3 face, 6 solve frames at belly height ===== -->
      <!-- face square x 5.5..9.5, y 9.4..13.4; 9 stickers 1.1 wide, 0.18 gap.
           sticker top-left x's: 5.6, 6.78, 7.96 ; y's: 9.5, 10.68, 11.86.
           sticker size 1.04 x 1.04. dark frame behind. -->
      <g id="cube-stage">
        <!-- shared dark cube frame (drawn once, under every face via each frame's
             own backdrop so toggling is clean) -->

        <!-- S0: SCRAMBLED -->
        <g id="s0" class="sf">
          <rect x="5.4" y="9.3" width="4.2" height="4.2" rx="0.25" fill="#0e0e12"/>
          <rect x="5.6"  y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="9.5"   width="1.04" height="1.04" fill="#00A04A"/>
          <rect x="7.96" y="9.5"   width="1.04" height="1.04" fill="#FDD500"/>
          <rect x="5.6"  y="10.68" width="1.04" height="1.04" fill="#0E5FD9"/>
          <rect x="6.78" y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="10.68" width="1.04" height="1.04" fill="#FAFAFA"/>
          <rect x="5.6"  y="11.86" width="1.04" height="1.04" fill="#FF7A00"/>
          <rect x="6.78" y="11.86" width="1.04" height="1.04" fill="#0E5FD9"/>
          <rect x="7.96" y="11.86" width="1.04" height="1.04" fill="#00A04A"/>
        </g>

        <!-- S1: one swap done — top row starting to align red -->
        <g id="s1" class="sf">
          <rect x="5.4" y="9.3" width="4.2" height="4.2" rx="0.25" fill="#0e0e12"/>
          <rect x="5.6"  y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="9.5"   width="1.04" height="1.04" fill="#FDD500"/>
          <rect x="5.6"  y="10.68" width="1.04" height="1.04" fill="#00A04A"/>
          <rect x="6.78" y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="10.68" width="1.04" height="1.04" fill="#FAFAFA"/>
          <rect x="5.6"  y="11.86" width="1.04" height="1.04" fill="#FF7A00"/>
          <rect x="6.78" y="11.86" width="1.04" height="1.04" fill="#0E5FD9"/>
          <rect x="7.96" y="11.86" width="1.04" height="1.04" fill="#0E5FD9"/>
        </g>

        <!-- S2: top row solved red, middle forming -->
        <g id="s2" class="sf">
          <rect x="5.4" y="9.3" width="4.2" height="4.2" rx="0.25" fill="#0e0e12"/>
          <rect x="5.6"  y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="5.6"  y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="10.68" width="1.04" height="1.04" fill="#00A04A"/>
          <rect x="5.6"  y="11.86" width="1.04" height="1.04" fill="#FF7A00"/>
          <rect x="6.78" y="11.86" width="1.04" height="1.04" fill="#0E5FD9"/>
          <rect x="7.96" y="11.86" width="1.04" height="1.04" fill="#00A04A"/>
        </g>

        <!-- S3: two rows red, bottom forming -->
        <g id="s3" class="sf">
          <rect x="5.4" y="9.3" width="4.2" height="4.2" rx="0.25" fill="#0e0e12"/>
          <rect x="5.6"  y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="5.6"  y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="5.6"  y="11.86" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="11.86" width="1.04" height="1.04" fill="#0E5FD9"/>
          <rect x="7.96" y="11.86" width="1.04" height="1.04" fill="#00A04A"/>
        </g>

        <!-- S4: nearly solved, one corner left -->
        <g id="s4" class="sf">
          <rect x="5.4" y="9.3" width="4.2" height="4.2" rx="0.25" fill="#0e0e12"/>
          <rect x="5.6"  y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="5.6"  y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="5.6"  y="11.86" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="11.86" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="11.86" width="1.04" height="1.04" fill="#0E5FD9"/>
        </g>

        <!-- S5: SOLVED — all red -->
        <g id="s5" class="sf">
          <rect x="5.4" y="9.3" width="4.2" height="4.2" rx="0.25" fill="#0e0e12"/>
          <rect x="5.6"  y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="9.5"   width="1.04" height="1.04" fill="#E02029"/>
          <rect x="5.6"  y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="10.68" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="5.6"  y="11.86" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="6.78" y="11.86" width="1.04" height="1.04" fill="#E02029"/>
          <rect x="7.96" y="11.86" width="1.04" height="1.04" fill="#E02029"/>
        </g>
      </g>
    </g>
  </g>

  <!-- got-it sparkle, top-right of the cube -->
  <g class="spark">
    <rect x="10.0" y="8.6"  width="1"   height="0.5" fill="#FFE066"/>
    <rect x="10.0" y="9.1"  width="1"   height="1"   fill="#FFE066"/>
    <rect x="10.0" y="10.1" width="1"   height="0.5" fill="#FFE066"/>
    <rect x="9.2"  y="9.1"  width="0.8" height="1"   fill="#FFE066"/>
    <rect x="11.0" y="9.1"  width="0.8" height="1"   fill="#FFE066"/>
  </g>
</svg>
