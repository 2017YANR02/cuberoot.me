    <!-- steady claw on the LEFT side of the cube (clear of left eye) -->
    <g fill="#DE886D">
      <rect class="arm-steady" x="3.2" y="11.6" width="2" height="1.8"/>
    </g>
    <!-- turning claw gripping the RIGHT edge mid-height (clear of right eye, does the R turn) -->
    <g fill="#DE886D">
      <rect class="arm-turn" x="9.9" y="10.6" width="2" height="1.9"/>
    </g>

    <!-- solved sparkle above-right -->
    <g class="spark" fill="#FFE066">
      <rect x="12.0" y="5.0" width="1" height="0.6"/>
      <rect x="12.0" y="5.6" width="1" height="1"/>
      <rect x="12.0" y="6.6" width="1" height="0.6"/>
      <rect x="11.0" y="5.6" width="1" height="1"/>
      <rect x="13.0" y="5.6" width="1" height="1"/>
    </g>
  </g>
</svg>
