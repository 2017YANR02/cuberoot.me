<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <!-- a03-lcd-spin: pixel/LCD sprite-frame cube doing a true vertical-axis spin.
       8 discrete frames stacked as <g>, toggled by CSS steps(8). Two front faces
       share a vertical centre edge; as the cube spins rightward the front face
       slides from wide-LEFT to wide-RIGHT while the next face enters from the far
       edge, and the dominant colour cycles white->green->yellow->blue->white.
       Each colour is the wide "front" for two consecutive frames, and the wide
       face hands off across the loop seam (blue-slim+white-wide at F7 ->
       white-wide+green-slim at F0) so the spin is SEAMLESS. Clawd cradles it at
       belly height, eyes flick with the spin, gentle breathe + blink. Crisp LCD
       look (no blur). -->
  <defs>
    <style>
      #ground-shadow { transform-box: view-box; transform-origin: 7.5px 15.5px;
        animation: shadow 4s infinite ease-in-out; }
      .breathe { transform-box: view-box; transform-origin: 7.5px 13px;
        animation: breathe 4s infinite ease-in-out; }
      .arm-l { transform-box: fill-box; transform-origin: 100% 50%;
        animation: arm-l 4s infinite ease-in-out; }
      .arm-r { transform-box: fill-box; transform-origin: 0% 50%;
        animation: arm-r 4s infinite ease-in-out; }
      .eyes-blink { transform-box: view-box; transform-origin: 7.5px 9px;
        animation: blink 4s infinite ease-in-out; }
      .eyes-track { transform-box: view-box; transform-origin: 7.5px 9px;
        animation: eye-track 4s infinite steps(8); }

      /* 8 LCD frames toggled crisply by steps */
      .cube-frame { opacity: 0; }
      #f0 { animation: f0 4s infinite steps(1); }
      #f1 { animation: f1 4s infinite steps(1); }
      #f2 { animation: f2 4s infinite steps(1); }
      #f3 { animation: f3 4s infinite steps(1); }
      #f4 { animation: f4 4s infinite steps(1); }
      #f5 { animation: f5 4s infinite steps(1); }
      #f6 { animation: f6 4s infinite steps(1); }
      #f7 { animation: f7 4s infinite steps(1); }
      @keyframes f0 { 0%,12.5% { opacity:1 } 12.51%,100% { opacity:0 } }
      @keyframes f1 { 0%,12.5% { opacity:0 } 12.51%,25% { opacity:1 } 25.01%,100% { opacity:0 } }
      @keyframes f2 { 0%,25% { opacity:0 } 25.01%,37.5% { opacity:1 } 37.51%,100% { opacity:0 } }
      @keyframes f3 { 0%,37.5% { opacity:0 } 37.51%,50% { opacity:1 } 50.01%,100% { opacity:0 } }
      @keyframes f4 { 0%,50% { opacity:0 } 50.01%,62.5% { opacity:1 } 62.51%,100% { opacity:0 } }
      @keyframes f5 { 0%,62.5% { opacity:0 } 62.51%,75% { opacity:1 } 75.01%,100% { opacity:0 } }
      @keyframes f6 { 0%,75% { opacity:0 } 75.01%,87.5% { opacity:1 } 87.51%,100% { opacity:0 } }
      @keyframes f7 { 0%,87.5% { opacity:0 } 87.51%,100% { opacity:1 } }

      @keyframes shadow {
        0%,100% { opacity:0.5; transform: scaleX(1); }
        50%     { opacity:0.45; transform: scaleX(0.96); }
      }
      @keyframes breathe {
        0%,100% { transform: scale(1,1) translateY(0); }
        50%     { transform: scale(1.012,0.988) translateY(0.16px); }
      }
      @keyframes arm-l {
        0%,100% { transform: rotate(0deg) translate(0.3px,-0.4px); }
        50%     { transform: rotate(3deg) translate(0.45px,-0.5px); }
      }
      @keyframes arm-r {
        0%,100% { transform: rotate(0deg) translate(-0.3px,-0.4px); }
        50%     { transform: rotate(-3deg) translate(-0.45px,-0.5px); }
      }
      @keyframes blink {
        0%,46%,52%,100% { transform: scaleY(1); }
        49%             { transform: scaleY(0.12); }
      }
      /* eyes flick step-by-step following the front face sliding rightward */
      @keyframes eye-track {
        0%   { transform: translateX(-0.4px); }
        50%  { transform: translateX(0.4px); }
        100% { transform: translateX(-0.4px); }
      }
    </style>
  </defs>

  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>

  <!-- legs static -->
  <g fill="#DE886D">
    <rect x="3" y="13" width="1" height="2"/>
    <rect x="5" y="13" width="1" height="2"/>
    <rect x="9" y="13" width="1" height="2"/>
    <rect x="11" y="13" width="1" height="2"/>
  </g>

  <g class="breathe">
    <!-- torso -->
    <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>

    <!-- eyes -->
    <g class="eyes-track">
      <g class="eyes-blink" fill="#000">
        <rect x="4" y="8" width="1" height="2"/>
        <rect x="10" y="8" width="1" height="2"/>
      </g>
    </g>

    <!-- arms cradle the cube (lowered to belly height) -->
    <rect class="arm-l" x="0"  y="10" width="2" height="2" fill="#DE886D"/>
    <rect class="arm-r" x="13" y="10" width="2" height="2" fill="#DE886D"/>

    <!-- ===== CUBE: 8 LCD sprite frames, held at belly y~9.1..13.7 ===== -->
    <!-- Two geometry templates, drawn at y=8.0..12.6 then translated +1.1 down.
         centre seam x=7.5.
         Template A = LEFT face wide + RIGHT face slim (front just arrived left).
         Template B = LEFT face slim + RIGHT face wide (front sliding to right).
         {L}=left colour, {R}=right colour vary per frame; geometry is fixed. -->
    <g id="cube-stage" transform="translate(0,1.1)">

      <!-- F0  A: white wide-L, green slim-R -->
      <g id="f0" class="cube-frame">
        <polygon points="4.5,8.6 7.5,8.0 10.5,8.6 10.5,12.0 7.5,12.6 4.5,12.0" fill="#0e0e12"/>
        <polygon points="4.8,8.75 6.05,8.5 6.05,11.85 4.8,12.05" fill="#FAFAFA"/>
        <polygon points="6.2,8.48 7.4,8.25 7.4,11.6 6.2,11.82" fill="#FAFAFA"/>
        <polygon points="7.6,8.25 8.6,8.45 8.6,11.78 7.6,11.6" fill="#00A04A"/>
        <polygon points="8.75,8.48 9.75,8.68 9.75,11.95 8.75,11.78" fill="#00A04A"/>
        <polygon points="9.9,8.7 10.3,8.78 10.3,12.05 9.9,11.95" fill="#00A04A"/>
        <rect x="7.42" y="8.05" width="0.16" height="4.5" fill="#16161b"/>
        <line x1="4.8" y1="9.85" x2="10.3" y2="9.85" stroke="#16161b" stroke-width="0.16"/>
        <line x1="4.8" y1="10.95" x2="10.3" y2="10.95" stroke="#16161b" stroke-width="0.16"/>
      </g>

      <!-- F1  B: white slim-L, green wide-R -->
      <g id="f1" class="cube-frame">
        <polygon points="6.4,8.35 7.5,8.1 10.5,8.65 10.5,12.0 7.5,12.5 6.4,12.2" fill="#0e0e12"/>
        <polygon points="6.7,8.45 7.4,8.28 7.4,11.6 6.7,11.95" fill="#FAFAFA"/>
        <polygon points="7.6,8.28 9.0,8.55 9.0,11.88 7.6,11.6" fill="#00A04A"/>
        <polygon points="9.15,8.58 10.3,8.78 10.3,12.05 9.15,11.9" fill="#00A04A"/>
        <rect x="7.42" y="8.1" width="0.16" height="4.45" fill="#16161b"/>
        <line x1="6.7" y1="9.9" x2="10.3" y2="9.95" stroke="#16161b" stroke-width="0.16"/>
        <line x1="6.7" y1="11.0" x2="10.3" y2="11.05" stroke="#16161b" stroke-width="0.16"/>
      </g>

      <!-- F2  A: green wide-L, yellow slim-R -->
      <g id="f2" class="cube-frame">
        <polygon points="4.5,8.6 7.5,8.0 10.5,8.6 10.5,12.0 7.5,12.6 4.5,12.0" fill="#0e0e12"/>
        <polygon points="4.8,8.75 6.05,8.5 6.05,11.85 4.8,12.05" fill="#00A04A"/>
        <polygon points="6.2,8.48 7.4,8.25 7.4,11.6 6.2,11.82" fill="#00A04A"/>
        <polygon points="7.6,8.25 8.6,8.45 8.6,11.78 7.6,11.6" fill="#FDD500"/>
        <polygon points="8.75,8.48 9.75,8.68 9.75,11.95 8.75,11.78" fill="#FDD500"/>
        <polygon points="9.9,8.7 10.3,8.78 10.3,12.05 9.9,11.95" fill="#FDD500"/>
        <rect x="7.42" y="8.05" width="0.16" height="4.5" fill="#16161b"/>
        <line x1="4.8" y1="9.85" x2="10.3" y2="9.85" stroke="#16161b" stroke-width="0.16"/>
        <line x1="4.8" y1="10.95" x2="10.3" y2="10.95" stroke="#16161b" stroke-width="0.16"/>
      </g>

      <!-- F3  B: green slim-L, yellow wide-R -->
      <g id="f3" class="cube-frame">
        <polygon points="6.4,8.35 7.5,8.1 10.5,8.65 10.5,12.0 7.5,12.5 6.4,12.2" fill="#0e0e12"/>
        <polygon points="6.7,8.45 7.4,8.28 7.4,11.6 6.7,11.95" fill="#00A04A"/>
        <polygon points="7.6,8.28 9.0,8.55 9.0,11.88 7.6,11.6" fill="#FDD500"/>
        <polygon points="9.15,8.58 10.3,8.78 10.3,12.05 9.15,11.9" fill="#FDD500"/>
        <rect x="7.42" y="8.1" width="0.16" height="4.45" fill="#16161b"/>
        <line x1="6.7" y1="9.9" x2="10.3" y2="9.95" stroke="#16161b" stroke-width="0.16"/>
        <line x1="6.7" y1="11.0" x2="10.3" y2="11.05" stroke="#16161b" stroke-width="0.16"/>
      </g>

      <!-- F4  A: yellow wide-L, blue slim-R -->
      <g id="f4" class="cube-frame">
        <polygon points="4.5,8.6 7.5,8.0 10.5,8.6 10.5,12.0 7.5,12.6 4.5,12.0" fill="#0e0e12"/>
        <polygon points="4.8,8.75 6.05,8.5 6.05,11.85 4.8,12.05" fill="#FDD500"/>
        <polygon points="6.2,8.48 7.4,8.25 7.4,11.6 6.2,11.82" fill="#FDD500"/>
        <polygon points="7.6,8.25 8.6,8.45 8.6,11.78 7.6,11.6" fill="#0E5FD9"/>
        <polygon points="8.75,8.48 9.75,8.68 9.75,11.95 8.75,11.78" fill="#0E5FD9"/>
        <polygon points="9.9,8.7 10.3,8.78 10.3,12.05 9.9,11.95" fill="#0E5FD9"/>
        <rect x="7.42" y="8.05" width="0.16" height="4.5" fill="#16161b"/>
        <line x1="4.8" y1="9.85" x2="10.3" y2="9.85" stroke="#16161b" stroke-width="0.16"/>
        <line x1="4.8" y1="10.95" x2="10.3" y2="10.95" stroke="#16161b" stroke-width="0.16"/>
      </g>

      <!-- F5  B: yellow slim-L, blue wide-R -->
      <g id="f5" class="cube-frame">
        <polygon points="6.4,8.35 7.5,8.1 10.5,8.65 10.5,12.0 7.5,12.5 6.4,12.2" fill="#0e0e12"/>
        <polygon points="6.7,8.45 7.4,8.28 7.4,11.6 6.7,11.95" fill="#FDD500"/>
        <polygon points="7.6,8.28 9.0,8.55 9.0,11.88 7.6,11.6" fill="#0E5FD9"/>
        <polygon points="9.15,8.58 10.3,8.78 10.3,12.05 9.15,11.9" fill="#0E5FD9"/>
        <rect x="7.42" y="8.1" width="0.16" height="4.45" fill="#16161b"/>
        <line x1="6.7" y1="9.9" x2="10.3" y2="9.95" stroke="#16161b" stroke-width="0.16"/>
        <line x1="6.7" y1="11.0" x2="10.3" y2="11.05" stroke="#16161b" stroke-width="0.16"/>
      </g>

      <!-- F6  A: blue wide-L, white slim-R -->
      <g id="f6" class="cube-frame">
        <polygon points="4.5,8.6 7.5,8.0 10.5,8.6 10.5,12.0 7.5,12.6 4.5,12.0" fill="#0e0e12"/>
        <polygon points="4.8,8.75 6.05,8.5 6.05,11.85 4.8,12.05" fill="#0E5FD9"/>
        <polygon points="6.2,8.48 7.4,8.25 7.4,11.6 6.2,11.82" fill="#0E5FD9"/>
        <polygon points="7.6,8.25 8.6,8.45 8.6,11.78 7.6,11.6" fill="#FAFAFA"/>
        <polygon points="8.75,8.48 9.75,8.68 9.75,11.95 8.75,11.78" fill="#FAFAFA"/>
        <polygon points="9.9,8.7 10.3,8.78 10.3,12.05 9.9,11.95" fill="#FAFAFA"/>
        <rect x="7.42" y="8.05" width="0.16" height="4.5" fill="#16161b"/>
        <line x1="4.8" y1="9.85" x2="10.3" y2="9.85" stroke="#16161b" stroke-width="0.16"/>
        <line x1="4.8" y1="10.95" x2="10.3" y2="10.95" stroke="#16161b" stroke-width="0.16"/>
      </g>

      <!-- F7  B: blue slim-L, white wide-R (seam: hands white back to F0 wide-L) -->
      <g id="f7" class="cube-frame">
        <polygon points="6.4,8.35 7.5,8.1 10.5,8.65 10.5,12.0 7.5,12.5 6.4,12.2" fill="#0e0e12"/>
        <polygon points="6.7,8.45 7.4,8.28 7.4,11.6 6.7,11.95" fill="#0E5FD9"/>
        <polygon points="7.6,8.28 9.0,8.55 9.0,11.88 7.6,11.6" fill="#FAFAFA"/>
        <polygon points="9.15,8.58 10.3,8.78 10.3,12.05 9.15,11.9" fill="#FAFAFA"/>
        <rect x="7.42" y="8.1" width="0.16" height="4.45" fill="#16161b"/>
        <line x1="6.7" y1="9.9" x2="10.3" y2="9.95" stroke="#16161b" stroke-width="0.16"/>
        <line x1="6.7" y1="11.0" x2="10.3" y2="11.05" stroke="#16161b" stroke-width="0.16"/>
      </g>
    </g>
  </g>
</svg>
