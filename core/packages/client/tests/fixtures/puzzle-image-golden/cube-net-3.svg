.vc-paint-palette {
  display: flex; flex-direction: column; align-items: flex-start; gap: 0.35rem;
}
.vc-paint-swatch {
  width: 30px; height: 30px;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 5px; padding: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.12s ease, transform 0.08s ease;
}
.vc-paint-swatch:hover { transform: scale(1.08); }
.vc-paint-swatch.is-active {
  border-color: var(--accent, #ff8800);
  box-shadow: 0 0 0 2px rgba(255,136,0,0.3);
}
.vc-paint-empty-row {
  display: flex; align-items: center; gap: 0.5rem;
}
.vc-paint-empty-hint {
  font-size: 0.72rem; color: var(--text-muted, #888);
  white-space: nowrap;
}
</style><div class="vc-paint-empty-row"><button type="button" class="vc-paint-swatch vc-paint-swatch-empty" style="background:#5a5a5a" title="空缺(灰)" aria-label="empty"></button><span class="vc-paint-empty-hint">右键置灰</span></div><button type="button" class="vc-paint-swatch is-active" style="background:#ffffff" title="U" aria-label="color U"></button><button type="button" class="vc-paint-swatch" style="background:#f4f400" title="D" aria-label="color D"></button><button type="button" class="vc-paint-swatch" style="background:#44ee00" title="F" aria-label="color F"></button><button type="button" class="vc-paint-swatch" style="background:#2266ff" title="B" aria-label="color B"></button><button type="button" class="vc-paint-swatch" style="background:#ff0000" title="R" aria-label="color R"></button><button type="button" class="vc-paint-swatch" style="background:#ff8000" title="L" aria-label="color L"></button></div></div><div class="vc-paint-controls"><style>
.vc-paint-controls {
  display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
  width: 100%;
}
.vc-paint-actions {
  display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 0.4rem;
}
.vc-paint-btn {
  display: inline-flex; align-items: center; gap: 0.3rem;
  background: var(--panel-sub, #2a2a2a);
  border: 1px solid var(--border, #444);
  color: var(--text); padding: 0.35rem 0.6rem;
  border-radius: 5px; font-size: 0.8rem; cursor: pointer;
}
.vc-paint-btn:hover:not(:disabled) { border-color: var(--accent, #ff8800); }
.vc-paint-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.vc-paint-btn-primary {
  background: var(--accent, #ff8800); color: #000;
  border-color: var(--accent, #ff8800); font-weight: 600;
}
.vc-paint-err {
  font-size: 0.85rem; color: #ff8866;
  text-align: center; max-width: 28rem; line-height: 1.4;
}
.vc-paint-err-flash {
  background: rgba(255,80,80,0.12);
  border: 1px solid rgba(255,120,80,0.45);
  color: #ffb38a;
  padding: 0.35rem 0.7rem;
  border-radius: 5px;
  animation: vcPaintFlash 0.18s ease-out;
}
.vc-paint-actions .bool-toggle-label {
  font-size: 0.8rem;
  color: var(--text);
}
@keyframes vcPaintFlash {
  from { transform: scale(0.96); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
</style><div class="vc-paint-actions"><button type="button" class="vc-paint-btn" title="全部置灰(保留中心)"><span>清空</span></button><button type="button" class="vc-paint-btn" title="还原到 solved"><span>还原</span></button><button type="button" class="vc-paint-btn" title="随机合法状态(25 步随机 HTM)"><span>随机</span></button><button type="button" class="vc-paint-btn vc-paint-btn-primary" disabled="" title="用 cubeopt 求最优解"><span>求最优解</span></button></div></div></div>