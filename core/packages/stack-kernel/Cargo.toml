[package]
name = "stack-kernel"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

# wasm-opt 二进制下载 flaky;LLVM opt-level=3 + LTO 已经够用。
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
